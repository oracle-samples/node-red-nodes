<script type="text/javascript">
RED.nodes.registerType("iot-update-relationship", {
    category: "oci",
    paletteLabel: "update relationship",
    defaults: {
        name: { value: "" },
        ociConfig: { type: "oci-config", required: true },
        iotDomainId: { value: "" },
        relationshipKey: { value: "" },
        content: { value: "" }
    },
    inputs: 1,
    outputs: 1,
    color: "#F0CC72",
    icon: "font-awesome/fa-share-alt",
    label: function () {
        return this.name || "update relationship";
    }
});
</script>

<script type="text/x-red" data-template-name="iot-update-relationship">
    <div class="form-row">
        <label for="node-input-name" style="width:160px;"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-ociConfig" style="width:160px;"><i class="fa fa-cloud"></i> OCI Config</label>
        <input type="text" id="node-input-ociConfig">
    </div>
    <div class="form-row">
        <label for="node-input-iotDomainId" style="width:160px;"><i class="fa fa-sitemap"></i> IoT Domain ID</label>
        <input type="text" id="node-input-iotDomainId" placeholder="ocid1.iotdomain.oc1...">
        <div style="margin-left:165px;font-size:11px;color:#888;margin-top:2px;">
            If empty, reads from <code>msg.iotDomainId</code>.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-relationshipKey" style="width:160px;"><i class="fa fa-link"></i> Default Relationship Key</label>
        <input type="text" id="node-input-relationshipKey" placeholder="sourceTwinOcid->targetTwinOcid:contentPath">
        <div style="margin-left:165px;font-size:11px;color:#888;margin-top:2px;">
            Optional fallback if <code>msg.relationshipKey</code> and <code>msg.payload.relationshipKey</code> are missing.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-content" style="width:160px;vertical-align:top;margin-top:2px;"><i class="fa fa-code"></i> Default Content</label>
        <textarea id="node-input-content" rows="5" style="width:calc(100% - 167px);font-family:monospace;font-size:12px;" placeholder='{"state":"RUNNING"}'></textarea>
        <div style="margin-left:165px;font-size:11px;color:#888;margin-top:2px;">
            Optional JSON object fallback if <code>msg.content</code> and <code>msg.payload.content</code> are missing.
        </div>
    </div>
    <div class="form-tips" style="margin-left:165px;color:#666;font-size:11px;line-height:1.4">
        <b>Tip:</b> This is a runtime-driven node. Message values take precedence:<br/>
        <code>msg.iotDomainId</code>, <code>msg.relationshipKey</code>, <code>msg.content</code>.
    </div>
</script>

<script type="text/x-red" data-help-name="iot-update-relationship">
<p>Updates OCI IoT digital twin relationship content through the OCI REST API.</p>

<h3>Configuration</h3>
<dl class="message-properties">
    <dt>OCI Config</dt>
    <dd>References an OCI Config node for authentication and region.</dd>
    <dt>IoT Domain ID</dt>
    <dd>OCID of the IoT domain. If empty, reads from <code>msg.iotDomainId</code>.</dd>
    <dt>Default Relationship Key</dt>
    <dd>Optional fallback relationship key in the form <code>sourceTwinOcid-&gt;targetTwinOcid:contentPath</code>.
    Used only when <code>msg.relationshipKey</code> and <code>msg.payload.relationshipKey</code> are absent.</dd>
    <dt>Default Content</dt>
    <dd>Optional JSON object used as the relationship content payload.
    Used only when <code>msg.content</code> and <code>msg.payload.content</code> are absent.</dd>
</dl>

<h3>Outputs</h3>
<dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>Updated relationship object on success.</dd>
    <dt>relationshipId <span class="property-type">string</span></dt>
    <dd>Resolved relationship OCID used for the update.</dd>
    <dt>statusCode <span class="property-type">number</span></dt>
    <dd>HTTP status code from the OCI response.</dd>
    <dt>error <span class="property-type">object</span></dt>
    <dd>Error details on failure: <code>{ message, code }</code>.</dd>
</dl>

<h3>Runtime overrides</h3>
<dl class="message-properties">
    <dt>msg.iotDomainId <span class="property-type">string</span></dt><dd>Overrides the IoT Domain ID field.</dd>
    <dt>msg.relationshipKey <span class="property-type">string</span></dt><dd>Overrides Default Relationship Key. Falls back to <code>msg.payload.relationshipKey</code>, then the editor field.</dd>
    <dt>msg.payload.relationshipKey <span class="property-type">string</span></dt><dd>Used when <code>msg.relationshipKey</code> is absent.</dd>
    <dt>msg.content <span class="property-type">object</span></dt><dd>Overrides Default Content. Falls back to <code>msg.payload.content</code>, then the editor field.</dd>
    <dt>msg.payload.content <span class="property-type">object</span></dt><dd>Used when <code>msg.content</code> is absent.</dd>
</dl>

<h3>Details</h3>
<p>On failure the node calls <code>done(err)</code> and routes through Catch. Wire a Catch node for error/alert branches.</p>
<p>This node is scoped to runtime relationship-content updates only. Full relationship CRUD and digital twin instance CRUD are out of scope for v1.</p>
</script>
