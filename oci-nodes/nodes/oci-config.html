<script type="text/javascript">
RED.nodes.registerType("oci-config", {
    category: "config",
    color: "#F0CC72",
    defaults: {
        name: { value: "" },
        authType: { value: "config" },
        region: { value: "" },
        compartmentOcid: { value: "" },
        configFilePath: { value: "~/.oci/config" },
        profile: { value: "DEFAULT" },
        tenancyOcid: { value: "" },
        userOcid: { value: "" },
        fingerprint: { value: "" },
        privateKeyPath: { value: "" }
    },
    credentials: {
        passphrase: { type: "password" }
    },
    label: function () {
        var labels = { config: "Config File", instancePrincipal: "Instance Principal", resourcePrincipal: "Resource Principal", simple: "API Key" };
        var authLabel = labels[this.authType] || this.authType;
        if (this.name) return this.name;
        return this.region ? authLabel + " (" + this.region + ")" : "OCI Config";
    },
    oneditprepare: function () {
        var nodeId = this.id;

        function updateAuthFields() {
            var type = $("#node-config-input-authType").val();
            $(".auth-section").hide();
            if (type === "config") $(".auth-config").show();
            if (type === "simple") $(".auth-simple").show();
        }
        updateAuthFields();
        $("#node-config-input-authType").on("change", updateAuthFields);

        // Warn when fields are changed since last deploy.
        // Deferred so Node-RED's own field population during init doesn't trigger the warning.
        setTimeout(function () {
            $("[id^='node-config-input-']").on("change input", function () {
                $("#deploy-warning")
                    .css({ background: "#fff3cd", "border-color": "#ffc107", color: "#856404" })
                    .html('<i class="fa fa-exclamation-triangle"></i> <strong>Changes detected</strong> — click <strong>Update</strong> then <strong>Deploy</strong> before testing.');
            });
        }, 0);

        // Test Connection button
        $("#btn-test-oci").on("click", function () {
            var btn = $(this);
            var resultEl = $("#test-oci-result");
            btn.prop("disabled", true);
            resultEl.text("Testing...").css("color", "#888");
            $.ajax({
                url: "oci-config/" + nodeId + "/test",
                type: "POST",
                success: function (data) {
                    if (data.success) {
                        resultEl.text("\u2713 " + data.message).css("color", "#2ca02c");
                    } else {
                        resultEl.text("\u2717 " + data.message).css("color", "#d62728");
                    }
                },
                error: function (err) {
                    var msg = "Test failed";
                    if (err.status === 404) msg = "Deploy the flow first, then test";
                    resultEl.text("\u2717 " + msg).css("color", "#d62728");
                },
                complete: function () { btn.prop("disabled", false); }
            });
        });
    }
});
</script>

<script type="text/x-red" data-template-name="oci-config">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="Optional display name">
    </div>
    <fieldset><legend style="font-size:12px;font-weight:bold;color:#555;">Authentication</legend>
    <div class="form-row">
        <label for="node-config-input-authType"><i class="fa fa-key"></i> Auth Type</label>
        <select id="node-config-input-authType" style="width:200px;">
            <option value="config">Config File</option>
            <option value="instancePrincipal">Instance Principal</option>
            <option value="resourcePrincipal">Resource Principal</option>
            <option value="simple">API Key (Simple)</option>
        </select>
    </div>
    <!-- CONFIG FILE AUTH -->
    <div class="auth-section auth-config">
        <div class="form-row">
            <label for="node-config-input-configFilePath"><i class="fa fa-file-text-o"></i> Config File</label>
            <input type="text" id="node-config-input-configFilePath" placeholder="~/.oci/config">
        </div>
        <div class="form-row">
            <label for="node-config-input-profile"><i class="fa fa-id-card-o"></i> Profile</label>
            <input type="text" id="node-config-input-profile" placeholder="DEFAULT">
        </div>
    </div>
    <!-- SIMPLE (API KEY) AUTH -->
    <div class="auth-section auth-simple">
        <div class="form-row">
            <label for="node-config-input-tenancyOcid"><i class="fa fa-building"></i> Tenancy OCID</label>
            <input type="text" id="node-config-input-tenancyOcid" placeholder="ocid1.tenancy.oc1...">
        </div>
        <div class="form-row">
            <label for="node-config-input-userOcid"><i class="fa fa-user"></i> User OCID</label>
            <input type="text" id="node-config-input-userOcid" placeholder="ocid1.user.oc1...">
        </div>
        <div class="form-row">
            <label for="node-config-input-fingerprint"><i class="fa fa-fingerprint"></i> Fingerprint</label>
            <input type="text" id="node-config-input-fingerprint" placeholder="aa:bb:cc:dd:...">
        </div>
        <div class="form-row">
            <label for="node-config-input-privateKeyPath"><i class="fa fa-key"></i> Private Key Path</label>
            <input type="text" id="node-config-input-privateKeyPath" placeholder="/home/opc/.oci/oci_api_key.pem">
        </div>
        <div class="form-row">
            <label for="node-config-input-passphrase"><i class="fa fa-lock"></i> Passphrase</label>
            <input type="password" id="node-config-input-passphrase">
        </div>
    </div>
    </fieldset>

    <fieldset><legend style="font-size:12px;font-weight:bold;color:#555;">OCI Settings</legend>
    <div class="form-row">
        <label for="node-config-input-region"><i class="fa fa-globe"></i> Region</label>
        <input type="text" id="node-config-input-region" placeholder="us-ashburn-1">
    </div>
    <div class="form-row">
        <label for="node-config-input-compartmentOcid"><i class="fa fa-folder-o"></i> Compartment OCID</label>
        <input type="text" id="node-config-input-compartmentOcid" placeholder="ocid1.compartment.oc1...">
        <div style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;">Default compartment for child nodes (can be overridden per node).</div>
    </div>
    <div class="form-row" style="text-align:center;">
        <button type="button" class="red-ui-button" id="btn-test-oci">
            <i class="fa fa-plug"></i> Test Connection
        </button>
        <span id="test-oci-result" style="margin-left:10px;font-size:12px;"></span>
    </div>
    <div class="form-row" style="text-align:center;margin-top:2px;">
        <div id="deploy-warning" style="display:inline-block;font-size:11px;color:#555;background:#f4f4f4;border:1px solid #ccc;border-radius:3px;padding:5px 8px;">
            <i class="fa fa-info-circle"></i> After making changes, click <strong>Update</strong> then <strong>Deploy</strong> before testing.
        </div>
    </div>
    </fieldset>
</script>

<script type="text/x-red" data-help-name="oci-config">
<p>Provides shared OCI authentication and default region/compartment settings for OCI service nodes.</p>

<h3>Authentication Types</h3>
<dl class="message-properties">
    <dt>Config File</dt>
    <dd>Uses an OCI CLI config file (for example <code>~/.oci/config</code>) and profile name.</dd>
    <dt>Instance Principal</dt>
    <dd>Uses instance principal auth when running on OCI compute.</dd>
    <dt>Resource Principal</dt>
    <dd>Uses resource principal auth when running inside supported OCI services.</dd>
    <dt>API Key (Simple)</dt>
    <dd>Uses tenancy/user OCIDs, fingerprint, private key path, and optional passphrase.</dd>
</dl>

<h3>OCI Settings</h3>
<dl class="message-properties">
    <dt>Region</dt>
    <dd>Optional default OCI region for child nodes.</dd>
    <dt>Compartment OCID</dt>
    <dd>Optional default compartment OCID used by child nodes unless overridden.</dd>
    <dt>Test Connection</dt>
    <dd>Validates the current configuration and credentials against OCI after deploy.</dd>
</dl>

<h3>Notes</h3>
<ul>
    <li>After changing config values, click <b>Update</b> and then <b>Deploy</b> before using Test Connection.</li>
    <li>Child nodes can override region/compartment values at node level when needed.</li>
</ul>
</script>
