<script type="text/javascript">
RED.nodes.registerType("iot-telemetry", {
    category: "oci",
    paletteLabel: "telemetry",
    defaults: {
        name: { value: "" },
        iotDevice: { type: "iot-config", required: true },
        topic: { value: "" },
        qos: { value: "1" },
        addTimestamp: { value: true }
    },
    inputs: 1, outputs: 1,
    color: "#F0CC72",
    icon: "font-awesome/fa-wifi",
    label: function () { return this.name || "telemetry"; }
});
</script>

<script type="text/x-red" data-template-name="iot-telemetry">
    <div class="form-row">
        <label for="node-input-name" style="width:115px;"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-iotDevice" style="width:115px;"><i class="fa fa-microchip"></i> IoT Device</label>
        <input type="text" id="node-input-iotDevice" />
    </div>
    <div class="form-row">
        <label for="node-input-topic" style="width:115px;"><i class="fa fa-hashtag"></i> Topic</label>
        <input type="text" id="node-input-topic" placeholder="e.g. factory/device1/telemetry">
        <div style="margin-left:120px;font-size:11px;color:#888;margin-top:2px;">
            If empty, reads from <code>msg.topic</code>.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-qos" style="width:115px;"><i class="fa fa-signal"></i> QoS</label>
        <select id="node-input-qos" style="width:auto;">
            <option value="0">0 – At most once</option>
            <option value="1">1 – At least once</option>
            <option value="2">2 – Exactly once</option>
        </select>
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-addTimestamp" style="width:115px;"><i class="fa fa-clock-o"></i> Auto Timestamp</label>
        <input type="checkbox" id="node-input-addTimestamp" style="width:auto;vertical-align:middle;">
        <span style="font-size:12px;color:#666;"> Add <code>time</code> field (epoch microseconds) if not already present</span>
    </div>
    <div class="form-tips" style="margin-left:120px;"><b>Tip:</b> Leave topic or qos blank if you want to set them via msg properties.</div>
</script>

<script type="text/x-red" data-help-name="iot-telemetry">
<p>Publishes telemetry data to the OCI IoT Platform via MQTT.</p>

<h3>Configuration</h3>
<dl class="message-properties">
    <dt>IoT Device</dt>
    <dd>References an IoT Device config node for the MQTT connection.</dd>
    <dt>Topic</dt>
    <dd>MQTT topic to publish to. If empty, reads from <code>msg.topic</code>.
    If both are absent, the node reports an error.</dd>
    <dt>QoS</dt>
    <dd>MQTT QoS level for published messages. If empty, reads from <code>msg.qos</code>.</dd>
    <dt>Auto Timestamp</dt>
    <dd>When enabled, adds a <code>time</code> field (epoch microseconds) to the payload
    if one is not already present.
    Disable this if your payload already includes a <code>time</code> field.</dd>
    <dt>Payload</dt>
    <dd><code>msg.payload</code> is the telemetry data to publish. Objects are JSON-stringified;
    non-object values are wrapped as <code>{ "value": &lt;payload&gt; }</code>.</dd>
</dl>

<h3>Runtime overrides</h3>
<dl class="message-properties">
    <dt>msg.topic <span class="property-type">string</span></dt><dd>Used when Topic is blank in the editor.</dd>
    <dt>msg.qos <span class="property-type">number</span></dt><dd>Overrides configured QoS per message (0, 1, 2).</dd>
</dl>

<h3>Outputs</h3>
<dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>The original payload (passed through on successful publish).</dd>
    <dt>topic <span class="property-type">string</span></dt>
    <dd>The MQTT topic the message was published to.</dd>
    <dt>error <span class="property-type">object</span></dt>
    <dd>Error details on failure: <code>{ message, code }</code>.</dd>
</dl>

<h3>Details</h3>
<p>Publishes <code>msg.payload</code> to the configured topic. If the Topic field is blank,
<code>msg.topic</code> is used instead. If neither is set the node reports an error.</p>


<p>For structured telemetry, the payload must match the Digital Twin Model and Adapter
definition. For unstructured telemetry, the payload can be any JSON object.</p>

<h3>Typical Flows</h3>
<p><b>Timer-based sensor simulation:</b><br/>
<code>inject</code> (repeat every 10s) → <code>function</code> (build payload) → <code>iot telemetry</code></p>
<p><b>Dequeue → transform → publish:</b><br/>
<code>dequeue</code> → <code>split</code> → <code>smo-transformer</code> → <code>iot telemetry</code></p>
</script>
