<script type="text/javascript">
RED.nodes.registerType("iot-send-command", {
    category: "oci",
    paletteLabel: "send command",
    defaults: {
        name: { value: "" },
        ociConfig: { type: "oci-config", required: true },
        digitalTwinOcid: { value: "" },
        requestEndpoint: { value: "" },
        responseEndpoint: { value: "" },
        requestDuration: { value: "PT10M" },
        responseDuration: { value: "PT10M" },
        waitForResponse: { value: true }
    },
    inputs: 1, outputs: 1,
    color: "#F0CC72",
    icon: "font-awesome/fa-paper-plane",
    label: function () { return this.name || "send command"; },
    oneditprepare: function () {
        function updateResponseEndpoint() {
            $(".response-wait-row").toggle($("#node-input-waitForResponse").is(":checked"));
        }
        updateResponseEndpoint();
        $("#node-input-waitForResponse").on("change", updateResponseEndpoint);
    }
});
</script>

<script type="text/x-red" data-template-name="iot-send-command">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-ociConfig"><i class="fa fa-cloud"></i> OCI Config</label>
        <input type="text" id="node-input-ociConfig" />
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-digitalTwinOcid" style="width:140px;"><i class="fa fa-microchip"></i> Digital Twin OCID</label>
        <input type="text" id="node-input-digitalTwinOcid" placeholder="ocid1.iotdigitaltwininstance.oc1...">
        <div style="margin-left:145px;font-size:11px;color:#888;margin-top:2px;">
            The OCID of the digital twin instance to send the command to.
            If empty, reads from <code>msg.digitalTwinOcid</code>.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-requestEndpoint" style="width:140px;"><i class="fa fa-road"></i> Request Endpoint</label>
        <input type="text" id="node-input-requestEndpoint" placeholder="/endpoints/device-001/commands">
        <div style="margin-left:145px;font-size:11px;color:#888;margin-top:2px;">
            Exact MQTT endpoint/topic the device or gateway subscribes to. <code>msg.requestEndpoint</code> can override this value.
        </div>
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-waitForResponse" style="width:140px;"><i class="fa fa-reply"></i> Wait for Response</label>
        <input type="checkbox" id="node-input-waitForResponse" style="width:auto;vertical-align:middle;">
        <span style="font-size:12px;color:#666;"> Include response endpoint so the platform waits for a device acknowledgment</span>
    </div>
    <div class="form-row response-wait-row">
        <label for="node-input-responseEndpoint" style="width:140px;"><i class="fa fa-reply"></i> Response Endpoint</label>
        <input type="text" id="node-input-responseEndpoint" placeholder="/endpoints/device-001/responses">
        <div style="margin-left:145px;font-size:11px;color:#888;margin-top:2px;">
            Exact MQTT endpoint/topic the device or gateway publishes back to. <code>msg.responseEndpoint</code> can override this value.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-requestDuration" style="width:140px;"><i class="fa fa-clock-o"></i> Request Duration</label>
        <input type="text" id="node-input-requestDuration" placeholder="PT10M" style="width:120px;">
        <span style="font-size:12px;color:#666;margin-left:8px;">ISO 8601 duration (e.g. PT10M = 10 minutes, PT1H = 1 hour)</span>
    </div>
    <div class="form-row response-wait-row">
        <label for="node-input-responseDuration" style="width:140px;"><i class="fa fa-clock-o"></i> Response Duration</label>
        <input type="text" id="node-input-responseDuration" placeholder="PT10M" style="width:120px;">
        <span style="font-size:12px;color:#666;margin-left:8px;">How long the platform waits for the device to respond</span>
    </div>
</script>

<script type="text/x-red" data-help-name="iot-send-command">
<p>Sends a raw command to an OCI IoT Digital Twin instance via the OCI REST API.</p>

<h3>Configuration</h3>
<dl class="message-properties">
    <dt>OCI Config</dt>
    <dd>References an OCI Config node for authentication (Config File, Instance Principal, or API Key).</dd>
    <dt>Digital Twin OCID</dt>
    <dd>The OCID of the digital twin instance to send the command to.
    If empty, reads from <code>msg.digitalTwinOcid</code>.</dd>
    <dt>Request Endpoint</dt>
    <dd>The exact endpoint/topic the device or gateway subscribes to for commands, for example <code>/endpoints/device-001/commands</code>. <code>msg.requestEndpoint</code> can override this value.</dd>
    <dt>Wait for Response</dt>
    <dd>When enabled, includes a response endpoint so the platform waits for the device
    to send an acknowledgment. When disabled, the command is fire-and-forget.</dd>
    <dt>Response Endpoint</dt>
    <dd>The exact endpoint/topic the device or gateway publishes responses to, for example <code>/endpoints/device-001/responses</code>. Required when Wait for Response is enabled. <code>msg.responseEndpoint</code> can override this value.</dd>
    <dt>Request Duration</dt>
    <dd>How long the platform tries to deliver the command (ISO 8601 duration, e.g. <code>PT10M</code>, <code>PT1H</code>, <code>P1D</code>).
    Default: <code>PT10M</code> (10 minutes). Validated before API submission.</dd>
    <dt>Response Duration</dt>
    <dd>How long the platform waits for the device to respond (ISO 8601 duration).
    Default: <code>PT10M</code> (10 minutes). Only used when Wait for Response is enabled.</dd>
    <dt>Payload</dt>
    <dd><code>msg.payload</code> is the command data sent to the device (e.g. <code>{"action": "blink", "duration": 5}</code>).</dd>
</dl>

<h3>Outputs</h3>
<dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>The OCI API response containing command delivery details.</dd>
    <dt>statusCode <span class="property-type">number</span></dt>
    <dd>HTTP status code (200 on success).</dd>
    <dt>requestEndpoint <span class="property-type">string</span></dt>
    <dd>The exact request endpoint used.</dd>
    <dt>responseEndpoint <span class="property-type">string</span></dt>
    <dd>The exact response endpoint used. Included only when <b>Wait for Response</b> is enabled.</dd>
    <dt>commandStatusLocation <span class="property-type">string</span></dt>
    <dd>The OCI command status URL returned by the API when available.</dd>
    <dt>recordId <span class="property-type">string</span></dt>
    <dd>The Raw Command Data record ID parsed from <code>commandStatusLocation</code> when available. Use this directly with <b>oci ords poll</b> Command Status mode.</dd>
    <dt>rawCommandDataRecordId <span class="property-type">string</span></dt>
    <dd>Alias of <code>recordId</code> for flows that prefer an explicit Raw Command Data name.</dd>
    <dt>opcRequestId <span class="property-type">string</span></dt>
    <dd>OCI request identifier returned by the API when available.</dd>
    <dt>error <span class="property-type">object</span></dt>
    <dd>Error details on failure: <code>{ message, code }</code>.</dd>
</dl>

<h3>Runtime overrides</h3>
<dl class="message-properties">
    <dt>msg.digitalTwinOcid <span class="property-type">string</span></dt><dd>Overrides Digital Twin OCID when provided.</dd>
    <dt>msg.requestEndpoint <span class="property-type">string</span></dt><dd>Overrides Request Endpoint when provided.</dd>
    <dt>msg.responseEndpoint <span class="property-type">string</span></dt><dd>Overrides Response Endpoint when provided.</dd>
    <dt>msg.payload <span class="property-type">object</span></dt><dd>The command data sent to the device.</dd>
</dl>

<h3>Details</h3>
<p>This node calls the OCI IoT Platform's <code>invokeRawCommand</code> API to send a command
to a digital twin instance. The platform delivers the command to the device over MQTT
on the configured Request Endpoint. If the device is connected and listening (for example
via the <b>subscribe</b> node or another MQTT client), it receives the command and can
publish an acknowledgment to the configured Response Endpoint.</p>
<p>This node uses the OCI REST API (via the <b>oci-config</b> node), not the MQTT connection.
It sends commands <em>to</em> the device through the IoT Platform — the cloud-to-device direction.
Equivalent to running <code>oci iot digital-twin-instance invoke-raw-json-command</code> from the CLI.</p>

<h3>Prerequisites</h3>
<p>Install the OCI SDK in your Node-RED directory:</p>
<pre>cd ~/.node-red
npm install oci-sdk</pre>

<h3>Typical Flows</h3>
<p><b>Send a command from an inject node:</b><br/>
<code>inject</code> (JSON payload) → <code>iot send command</code> → <code>debug</code></p>
<p><b>Dynamic command routing:</b><br/>
<code>function</code> (sets msg.requestEndpoint, msg.responseEndpoint, and msg.payload) → <code>iot send command</code> → <code>debug</code></p>
<p><b>Full round-trip test:</b><br/>
<code>inject</code> → <code>iot send command</code> → <code>debug</code> (command sent)<br/>
<code>subscribe</code> → <code>debug</code> (message received on device side)</p>
<p><b>Check delivery through ORDS:</b><br/>
<code>iot send command</code> (outputs <code>msg.recordId</code>) → <code>oci ords poll</code> (Command Status) → <code>debug</code></p>
</script>
