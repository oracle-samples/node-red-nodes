<script type="text/javascript">
RED.nodes.registerType("iot-config", {
    category: "config",
    color: "#F0CC72",
    defaults: {
        deviceHost: { value: "", required: true },
        baseEndpoint: { value: "iot/v1" },
        clientId: { value: "", required: true },
        qos: { value: "1" },
        authType: { value: "basic" },
        caCertPath: { value: "" },
        clientCertPath: { value: "" },
        clientKeyPath: { value: "" },
        useProxy: { value: false },
        proxyUrl: { value: "" }
    },
    credentials: {
        username: { type: "text" },
        password: { type: "password" }
    },
    label: function () {
        return this.clientId || this.deviceHost || "IoT Device";
    },
    oneditprepare: function () {
        var nodeId = this.id;

        function updateAuthFields() {
            var type = $("#node-config-input-authType").val();
            $(".auth-section").hide();
            if (type === "basic") $(".auth-basic").show();
            if (type === "cert") $(".auth-cert").show();
        }
        updateAuthFields();
        $("#node-config-input-authType").on("change", updateAuthFields);

        // Proxy toggle
        function updateProxy() {
            if ($("#node-config-input-useProxy").is(":checked")) {
                $("#proxy-url-row").show();
            } else {
                $("#proxy-url-row").hide();
            }
        }
        updateProxy();
        $("#node-config-input-useProxy").on("change", updateProxy);

        // Test Connection
        $("#btn-test-iot").on("click", function () {
            var btn = $(this);
            var resultEl = $("#test-iot-result");
            btn.prop("disabled", true);
            resultEl.text("Testing...").css("color", "#888");
            $.ajax({
                url: "iot-config/" + nodeId + "/test",
                type: "POST",
                success: function (data) {
                    if (data.success) {
                        resultEl.text("\u2713 " + data.message).css("color", "#2ca02c");
                    } else {
                        resultEl.text("\u2717 " + data.message).css("color", "#d62728");
                    }
                },
                error: function (err) {
                    var msg = "Test failed";
                    if (err.status === 404) msg = "Deploy the flow first, then test.";
                    resultEl.text("\u2717 " + msg).css("color", "#d62728");
                },
                complete: function () { btn.prop("disabled", false); }
            });
        });
    }
});
</script>

<script type="text/x-red" data-template-name="iot-config">
    <fieldset><legend style="font-size:12px;font-weight:bold;color:#555;">Connection</legend>
    <div class="form-row">
        <label for="node-config-input-deviceHost"><i class="fa fa-globe"></i> Device Host</label>
        <input type="text" id="node-config-input-deviceHost" placeholder="abc123.device.iot.us-ashburn-1.oci.oraclecloud.com">
        <div style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;">
            The device host from your IoT Domain. Found via: <code>oci iot domain get --iot-domain-id &lt;OCID&gt; --query 'data."device-host"'</code>
        </div>
    </div>
    <div class="form-row">
        <label for="node-config-input-baseEndpoint"><i class="fa fa-road"></i> Base Endpoint</label>
        <input type="text" id="node-config-input-baseEndpoint" placeholder="iot/v1">
        <div style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;">
            MQTT topic prefix. Telemetry: <code>&lt;base&gt;/telemetry</code>, Commands: <code>&lt;base&gt;/cmd/&lt;key&gt;</code>, Responses: <code>&lt;base&gt;/rsp/&lt;key&gt;</code>
        </div>
    </div>
    <div class="form-row">
        <label for="node-config-input-clientId"><i class="fa fa-microchip"></i> Client ID</label>
        <input type="text" id="node-config-input-clientId" placeholder="your_device_name">
        <div style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;">
            MQTT client ID. Typically the name of your device or digital twin instance.
        </div>
    </div>
    <div class="form-row">
        <label for="node-config-input-qos"><i class="fa fa-signal"></i> QoS</label>
        <select id="node-config-input-qos" style="width:100px;">
            <option value="0">0 — At most once</option>
            <option value="1">1 — At least once</option>
            <option value="2">2 — Exactly once</option>
        </select>
    </div>
    </fieldset>

    <fieldset><legend style="font-size:12px;font-weight:bold;color:#555;">Authentication</legend>
    <div class="form-row">
        <label for="node-config-input-authType"><i class="fa fa-key"></i> Auth Type</label>
        <select id="node-config-input-authType" style="width:200px;">
            <option value="basic">Basic (Username / Password)</option>
            <option value="cert">Certificate (mTLS)</option>
        </select>
    </div>
    <!-- BASIC AUTH -->
    <div class="auth-section auth-basic">
        <div class="form-row">
            <label for="node-config-input-username"><i class="fa fa-user"></i> Username</label>
            <input type="text" id="node-config-input-username" placeholder="Digital twin external key">
        </div>
        <div class="form-row">
            <label for="node-config-input-password"><i class="fa fa-lock"></i> Password</label>
            <input type="password" id="node-config-input-password" placeholder="Vault secret content">
        </div>
    </div>
    <!-- CERT AUTH -->
    <div class="auth-section auth-cert" style="display:none;">
        <div class="form-row">
            <label for="node-config-input-caCertPath"><i class="fa fa-certificate"></i> CA Cert</label>
            <input type="text" id="node-config-input-caCertPath" placeholder="(optional) /path/to/ca.crt">
            <div style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;">
                Usually not needed — modern Node.js uses the system CA store.
            </div>
        </div>
        <div class="form-row">
            <label for="node-config-input-clientCertPath"><i class="fa fa-file-text-o"></i> Client Cert</label>
            <input type="text" id="node-config-input-clientCertPath" placeholder="/path/to/client_cert.pem">
        </div>
        <div class="form-row">
            <label for="node-config-input-clientKeyPath"><i class="fa fa-key"></i> Client Key</label>
            <input type="text" id="node-config-input-clientKeyPath" placeholder="/path/to/client_key.pem">
            <div style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;">
                Leave empty if both certificate and key are in the same file.
            </div>
        </div>
    </div>
    </fieldset>

    <fieldset><legend style="font-size:12px;font-weight:bold;color:#555;">Network</legend>
    <div class="form-row">
        <label for="node-config-input-useProxy"><i class="fa fa-exchange"></i> Use Proxy</label>
        <input type="checkbox" id="node-config-input-useProxy" style="width:auto;vertical-align:middle;">
    </div>
    <div class="form-row" id="proxy-url-row" style="display:none;">
        <label for="node-config-input-proxyUrl"><i class="fa fa-link"></i> Proxy URL</label>
        <input type="text" id="node-config-input-proxyUrl" placeholder="http://proxy-host:port">
    </div>
    <div class="form-row">
        <button type="button" class="red-ui-button" id="btn-test-iot" style="margin-left:105px;">
            <i class="fa fa-plug"></i> Test Connection
        </button>
        <span id="test-iot-result" style="margin-left:10px;font-size:12px;"></span>
    </div>
    </fieldset>
</script>
