<script type="text/javascript">
// =====================================================================
// Log Analytics Mapping Editor
// =====================================================================
if (!window.logMappingEditor) {
window.logMappingEditor = (function () {
    function _escapeHtml(s) {
        return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    var _valueLabelMap = {
        dequeued: "Field Name",
        msg: "Property Path",
        static: "Value"
    };

    var _valuePlaceholderMap = {
        dequeued: "e.g. sht_temperature",
        msg: "e.g. payload.deviceId",
        static: "e.g. THRESHOLD_BREACH"
    };

    function _addRow(m) {
        var srcType = m.sourceType || "dequeued";
        var row = $(
            '<div class="log-mapping-row" style="border:1px solid #ddd;border-radius:4px;padding:8px;margin-bottom:6px;background:#fafafa;">' +
              '<div style="display:flex;align-items:center;gap:8px;">' +
                '<div class="log-drag-handle" style="cursor:grab;padding:4px 2px;color:#999;font-size:16px;" title="Drag to reorder">&#9776;</div>' +
                '<div style="flex:1;"><label style="font-size:11px;color:#666;">Log Field</label>' +
                  '<input type="text" class="log-field" value="' + _escapeHtml(m.logField || "") + '" style="width:100%;" /></div>' +
                '<div style="width:140px;"><label style="font-size:11px;color:#666;">Source</label>' +
                  '<select class="log-source-type" style="width:100%;">' +
                    '<option value="dequeued"' + (srcType === "dequeued" ? ' selected' : '') + '>dequeued data</option>' +
                    '<option value="msg"' + (srcType === "msg" ? ' selected' : '') + '>msg property</option>' +
                    '<option value="static"' + (srcType === "static" ? ' selected' : '') + '>static value</option>' +
                  '</select></div>' +
                '<div style="flex:1;"><label style="font-size:11px;color:#666;" class="log-value-label">' + (_valueLabelMap[srcType] || "Value") + '</label>' +
                  '<input type="text" class="log-value" value="' + _escapeHtml(m.value || "") + '" placeholder="' + (_valuePlaceholderMap[srcType] || "") + '" style="width:100%;" /></div>' +
                '<div style="padding-top:14px;">' +
                  '<button type="button" class="red-ui-button red-ui-button-small" onclick="$(this).closest(\'.log-mapping-row\').remove();">&times;</button></div>' +
              '</div>' +
            '</div>'
        );
        row.find(".log-source-type").on("change", function () {
            var type = $(this).val();
            row.find(".log-value-label").text(_valueLabelMap[type] || "Value");
            row.find(".log-value").attr("placeholder", _valuePlaceholderMap[type] || "");
        });
        $("#log-mappings-container").append(row);
    }

    function renderAll(mappings) {
        $("#log-mappings-container").empty();
        if (Array.isArray(mappings)) {
            mappings.forEach(function (m) { _addRow(m); });
        }
    }

    function init(node) {
        var mappings = [];
        try { mappings = JSON.parse(node.mappings); } catch(e) { mappings = []; }
        if (!Array.isArray(mappings)) mappings = [];
        renderAll(mappings);

        $("#btn-add-log-mapping").off("click").on("click", function () {
            _addRow({ logField: "", sourceType: "dequeued", value: "" });
        });

        $("#log-mappings-container").sortable({
            handle: ".log-drag-handle", axis: "y", cursor: "grabbing",
            opacity: 0.7, placeholder: "log-sortable-placeholder", tolerance: "pointer"
        });
    }

    function save() {
        var mappings = [];
        $("#log-mappings-container .log-mapping-row").each(function () {
            var row = $(this);
            var m = {
                logField: row.find(".log-field").val().trim(),
                sourceType: row.find(".log-source-type").val(),
                value: row.find(".log-value").val().trim()
            };
            if (m.logField) mappings.push(m);
        });
        return JSON.stringify(mappings);
    }

    return { init: init, save: save, renderAll: renderAll };
})();
var logMappingEditor = window.logMappingEditor;
}

RED.nodes.registerType("oci-log-analytics", {
    category: "oci",
    paletteLabel: "log analytics",
    defaults: {
        name: { value: "" },
        ociConfig: { type: "oci-config", required: true },
        namespace: { value: "" },
        logGroupOcid: { value: "" },
        logSourceName: { value: "" },
        entityOcid: { value: "" },
        severity: { value: "INFO" },
        payloadSource: { value: "mappings" },
        mappings: { value: '[{"logField":"event","sourceType":"static","value":"THRESHOLD_BREACH"},{"logField":"device","sourceType":"dequeued","value":"deviceId"},{"logField":"location","sourceType":"dequeued","value":"location"},{"logField":"sht_temperature","sourceType":"dequeued","value":"sht_temperature"},{"logField":"threshold","sourceType":"dequeued","value":"threshold"},{"logField":"action","sourceType":"static","value":"shutdown_sent"}]' }
    },
    inputs: 1, outputs: 1,
    color: "#F0CC72",
    icon: "font-awesome/fa-file-text-o",
    label: function () { return this.name || "log analytics"; },
    oneditprepare: function () {
        var node = this;

        // Toggle mappings vs payload sections
        function updatePayloadSource() {
            var source = $("#node-input-payloadSource").val();
            if (source === "payload") {
                $("#log-mappings-section").hide();
                $("#log-payload-hint").show();
            } else {
                $("#log-mappings-section").show();
                $("#log-payload-hint").hide();
            }
        }
        $("#node-input-payloadSource").on("change", updatePayloadSource);

        // Init mappings editor
        logMappingEditor.init(node);
        updatePayloadSource();
    },
    oneditsave: function () {
        this.mappings = logMappingEditor.save();
    }
});
</script>

        <i class="fa fa-info-circle"></i> The node will send <code>msg.payload</code> as-is.

    <div id="log-mappings-section">

                Map log fields to dequeued data, message properties, or static values. Drag &#9776; to reorder.
            </div>

        <div class="form-row">
            <div id="log-mappings-container" style="margin-left:20px;margin-right:20px;"></div>
            <div style="margin-left:20px;margin-top:4px;">
                <button type="button" class="red-ui-button red-ui-button-small" id="btn-add-log-mapping">+ Add Mapping</button>
            </div>
        </div>

</script>

<script type="text/x-red" data-help-name="oci-log-analytics">
<p>Pushes log entries to OCI Logging Analytics for search, visualization, and alerting.</p>

<h3>Configuration</h3>
<dl class="message-properties">
    <dt>OCI Config</dt>
    <dd>References an OCI Config node for authentication.</dd>
    <dt>Namespace</dt>
    <dd>Your tenancy namespace. Find with <code>oci os ns get</code>.</dd>
    <dt>Log Group OCID</dt>
    <dd>The Logging Analytics log group to store logs in.</dd>
    <dt>Log Source Name</dt>
    <dd>Must match the source created in Logging Analytics Administration.</dd>
    <dt>Entity OCID</dt>
    <dd>Optional. Associates logs with a Logging Analytics entity.</dd>
    <dt>Default Severity</dt>
    <dd>Used as the <code>level</code> field if not already set. Overridden by <code>msg.severity</code>.</dd>
    <dt>Payload Source</dt>
    <dd>
        <b>Payload Mappings</b> &mdash; build the log entry using the mapping rows. Each row specifies:
        <ul>
            <li><b>Log Field</b> &mdash; the field name in the log entry (e.g. <code>device</code>, <code>event</code>)</li>
            <li><b>Source</b> &mdash; <code>dequeued data</code> reads from <code>msg.dequeued</code>,
                <code>msg property</code> reads from any <code>msg</code> path,
                <code>static value</code> uses a constant</li>
            <li><b>Value</b> &mdash; field name, property path, or literal value</li>
        </ul>
        <b>msg.payload</b> &mdash; sends <code>msg.payload</code> directly. Use a function node upstream.
    </dd>
</dl>

<h3>Default Mappings (Threshold Breach Example)</h3>
<p>The node ships with example mappings for a typical IoT threshold breach scenario:</p>
<pre>
Log Field         Source           Value
─────────         ──────           ─────
event             static value     THRESHOLD_BREACH
device            dequeued data    deviceId
location          dequeued data    location
sht_temperature   dequeued data    sht_temperature
threshold         dequeued data    threshold
action            static value     shutdown_sent
</pre>
<p>These assume an upstream <b>dequeue</b> node provides <code>msg.dequeued</code> with device telemetry.
Modify or replace these mappings to match your payload structure.</p>

<h3>Output</h3>
<dl class="message-properties">
    <dt>payload.statusCode <span class="property-type">number</span></dt>
    <dd>HTTP status code (200 on success).</dd>
    <dt>payload.requestId <span class="property-type">string</span></dt>
    <dd>OCI request ID for troubleshooting.</dd>
</dl>

<h3>Typical Flows</h3>
<p><b>Flow 1 &mdash; Log threshold breaches:</b><br/>
<code>dequeue</code> &rarr; <code>switch</code> (threshold) &rarr; <code>oci log analytics</code> (with mappings)</p>
<p><b>Flow 2 &mdash; Log command acknowledgments:</b><br/>
<code>sql</code> (query RAW_COMMAND_DATA) &rarr; <code>switch</code> (DELIVERY_STATUS) &rarr; <code>function</code> &rarr; <code>oci log analytics</code> (msg.payload mode)</p>
<p><b>Flow 3 &mdash; Log all errors:</b><br/>
<code>catch</code> (all) &rarr; <code>function</code> &rarr; <code>oci log analytics</code> (msg.payload mode)</p>
</script>
