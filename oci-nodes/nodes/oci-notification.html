<script type="text/javascript">
RED.nodes.registerType("oci-notification", {
    category: "oci",
    paletteLabel: "notification",
    defaults: {
        name: { value: "" },
        ociConfig: { type: "oci-config", required: true },
        topicOcid: { value: "" },
        msgTitle: { value: "" },
        msgBody: { value: "" }
    },
    inputs: 1, outputs: 1,
    color: "#F0CC72",
    icon: "font-awesome/fa-bell",
    label: function () { return this.name || "notification"; }
});
</script>

<script type="text/x-red" data-template-name="oci-notification">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-ociConfig"><i class="fa fa-cloud"></i> OCI Config</label>
        <input type="text" id="node-input-ociConfig" />
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-topicOcid"><i class="fa fa-bullhorn"></i> Topic OCID</label>
        <input type="text" id="node-input-topicOcid">
        <div style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;">
            Overridden by <code>msg.topicOcid</code> when set.
        </div>
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-msgTitle"><i class="fa fa-heading"></i> Title</label>
        <input type="text" id="node-input-msgTitle" placeholder="Notification title (optional)">
        <div style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;">
            Overridden by <code>msg.title</code> when set.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-msgBody"><i class="fa fa-align-left"></i> Body</label>
        <textarea id="node-input-msgBody" rows="4" style="width:100%;" placeholder="Notification body (optional)"></textarea>
        <div style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;">
            If empty, reads from <code>msg.payload</code>. Objects are JSON-stringified.
        </div>
    </div>
</script>

<script type="text/x-red" data-help-name="oci-notification">
<p>Publishes a message to an Oracle Cloud Infrastructure (OCI) Notifications topic.</p>

<h3>Configuration</h3>
<dl class="message-properties">
    <dt>OCI Config</dt><dd>References an OCI Config node for authentication and region.</dd>
    <dt>Topic OCID</dt>
    <dd>The OCID of the OCI Notifications topic to publish to.
    Overridden by <code>msg.topicOcid</code> when set.</dd>
    <dt>Title</dt>
    <dd>Optional message title. Overridden by <code>msg.title</code> when set.
    The title appears as the subject line for email subscriptions.</dd>
    <dt>Body</dt>
    <dd>The message body. If empty, uses <code>msg.payload</code> (objects are JSON-stringified).
    This is the content delivered to all topic subscriptions.</dd>
</dl>

<h3>Outputs</h3>
<dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>The OCI publish result containing the <code>messageId</code> and <code>timeStamp</code>.</dd>
    <dt>statusCode <span class="property-type">number</span></dt>
    <dd>HTTP status code (200 on success).</dd>
    <dt>error <span class="property-type">object</span></dt>
    <dd>Error details on failure: <code>{ message, code }</code>.</dd>
</dl>

<h3>Runtime overrides</h3>
<dl class="message-properties">
    <dt>msg.topicOcid <span class="property-type">string</span></dt><dd>Overrides the editor-configured Topic OCID.</dd>
    <dt>msg.title <span class="property-type">string</span></dt><dd>Overrides the editor-configured Title.</dd>
    <dt>msg.payload <span class="property-type">any</span></dt><dd>Used as message body when Body is empty in the editor.</dd>
</dl>

<h3>Details</h3>
<p>Uses the OCI SDK <code>NotificationDataPlaneClient</code> to publish messages.
Authentication is handled by the selected OCI Config node. The SDK client is
created once and reused across invocations.</p>

<p>OCI Notifications delivers messages to all active subscriptions on the topic,
which can include email, HTTPS webhooks, PagerDuty, Slack, SMS, and OCI Functions.</p>

<h3>Prerequisites</h3>
<p>Install the OCI SDK in your Node-RED directory:</p>
<pre>npm install oci-sdk</pre>
<p>Create a Notification Topic in the OCI Console and note its OCID. Add subscriptions
to the topic to receive messages.</p>

<h3>Typical Flows</h3>
<p><b>Alert on dequeue failure:</b><br/>
<code>begin transaction</code> → <code>dequeue</code> → <code>catch</code> → <code>oci notification</code></p>
<p><b>Dynamic topic routing:</b><br/>
<code>function</code> (sets msg.topicOcid) → <code>oci notification</code></p>
</script>
