<script type="text/javascript">
RED.nodes.registerType("iot-command", {
    category: "oci",
    paletteLabel: "command",
    defaults: {
        name: { value: "" },
        iotDevice: { type: "iot-config", required: true },
        topic: { value: "", required: true },
        qos: { value: "1" }
    },
    inputs: 0, outputs: 1,
    color: "#F0CC72",
    icon: "font-awesome/fa-terminal",
    label: function () { return this.name || "command"; }
});
</script>

<script type="text/x-red" data-template-name="iot-command">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-iotDevice"><i class="fa fa-microchip"></i> IoT Device</label>
        <input type="text" id="node-input-iotDevice" />
    </div>
    <div class="form-row">
        <label for="node-input-topic"><i class="fa fa-hashtag"></i> Topic</label>
        <input type="text" id="node-input-topic" placeholder="e.g. iot/v1/cmd/#">
        <div style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;">
            MQTT subscription topic. Supports <code>#</code> (multi-level) and <code>+</code> (single-level) wildcards.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-qos"><i class="fa fa-signal"></i> QoS</label>
        <select id="node-input-qos" style="width:auto;">
            <option value="0">0 – At most once</option>
            <option value="1">1 – At least once</option>
            <option value="2">2 – Exactly once</option>
        </select>
    </div>
</script>

<script type="text/x-red" data-help-name="iot-command">
<p>Subscribes to an MQTT topic and outputs a message whenever a command arrives.</p>

<h3>Important: This Node Has No Input</h3>
<p>The command node listens for incoming MQTT messages on the configured topic.
It has <b>no input port</b> — commands arrive from the broker, not from other nodes.
Wire its output to your command handling logic.</p>

<h3>Configuration</h3>
<dl class="message-properties">
    <dt>IoT Device</dt>
    <dd>References an IoT Device config node for the MQTT connection.</dd>
    <dt>Topic</dt>
    <dd>The MQTT topic to subscribe to. Required. Supports <code>#</code> (multi-level wildcard)
    and <code>+</code> (single-level wildcard). Examples:
    <ul>
        <li><code>iot/v1/cmd/#</code> — all commands under that prefix; <code>msg.commandKey</code> is the suffix (e.g. <code>shutdown</code>)</li>
        <li><code>iot/v1/cmd/reset</code> — fixed topic; only that command is received</li>
        <li><code>sensors/+/data</code> — any device's data topic</li>
    </ul></dd>
    <dt>QoS</dt>
    <dd>MQTT QoS level for the subscription (0, 1, or 2).</dd>
</dl>

<h3>Output</h3>
<dl class="message-properties">
    <dt>payload <span class="property-type">object | string</span></dt>
    <dd>The command payload. JSON payloads are parsed automatically; other messages are passed as strings.</dd>
    <dt>commandKey <span class="property-type">string</span></dt>
    <dd>For wildcard topics ending in <code>/#</code>, this is the portion that matched <code>#</code>
    (e.g. <code>"shutdown"</code> from <code>iot/v1/cmd/shutdown</code>).
    For fixed topics, this is the last segment of the received topic.</dd>
    <dt>topic <span class="property-type">string</span></dt>
    <dd>The full MQTT topic the message arrived on.</dd>
</dl>

<h3>Typical Flows</h3>
<p><b>Receive all commands:</b><br/>
<code>iot command</code> (topic: <code>iot/v1/cmd/#</code>) → <code>debug</code></p>
<p><b>Handle a specific command:</b><br/>
<code>iot command</code> (topic: <code>iot/v1/cmd/reset</code>) → <code>function</code> (reset logic)</p>
<p><b>Send a response after processing:</b><br/>
<code>iot command</code> → <code>function</code> (process) → <code>mqtt out</code> (publish response)</p>
</script>
