<script type="text/javascript">
var enqueueEditorStyles = '<style id="enqueue-editor-styles">' +
    '.enqueue-payload-toolbar{display:flex;justify-content:flex-end;gap:6px;margin-top:4px;margin-bottom:4px;}' +
    '.enqueue-payload-toolbar .enqueue-json-editor{width:30px;min-width:30px;padding:0;display:inline-flex;align-items:center;justify-content:center;}' +
    '.enqueue-payload-toolbar .enqueue-json-editor i{font-size:11px;}' +
'</style>';
if (!document.getElementById("enqueue-editor-styles")) {
    $("head").append(enqueueEditorStyles);
}

RED.nodes.registerType("enqueue", {
    category: "oracle db",
    paletteLabel: "enqueue",
    defaults: {
        name: { value: "" },
        connection: { type: "db-connection", required: true },
        queueName: { value: "" },
        recipients: { value: "" },
        userPayload: { value: "" },
        deliveryMode: { value: "persistent" },
        payloadType: { value: "json" },
        adtTypeName: { value: "" },
        enableOutput: { value: true },
        outputs: { value: 1 }
    },
    inputs: 1, outputs: 1,
    color: "#4C825C",
    icon: "font-awesome/fa-upload",
    label: function () { return this.name || "enqueue"; },
    oneditprepare: function () {
        var node = this;
        $("#node-input-outputs").val(node.outputs);
        $("#node-input-enableOutput").prop("checked", node.enableOutput !== false);
        $("#node-input-enableOutput").on("change", function () {
            $("#node-input-outputs").val(this.checked ? 1 : 0);
        });
        var PAYLOAD_HINTS = {
            json: 'A JSON object or array. A single object is enqueued as one message; each array element becomes a separate message. If empty, <code>msg.payload</code> is used.',
            raw:  'A plain string, encoded to a UTF-8 Buffer. For multiple messages, leave empty and pass an array of strings or Buffers via <code>msg.payload</code>.',
            adt:  'A JSON object or array. Field names must match the Oracle type\'s attribute names (uppercase). A single object becomes one message; each array element becomes a separate message. If empty, <code>msg.payload</code> is used.'
        };
        function updatePayloadType() {
            var type = $("#node-input-payloadType").val();
            $("#enqueue-adt-row").toggle(type === "adt");
            var isJsonLike = (type === "json" || type === "adt");
            $(".enqueue-json-editor").toggle(isJsonLike);
            $("#enqueue-payload-hint").html(PAYLOAD_HINTS[type] || PAYLOAD_HINTS.json);
        }
        $("#node-input-payloadType").on("change", updatePayloadType);
        updatePayloadType();

        $(".enqueue-json-editor").on("click", function () {
            var type = $("#node-input-payloadType").val();
            if (type !== "json" && type !== "adt") return;
            if (!(RED.editor && RED.editor.editJSON)) {
                RED.notify("JSON editor is not available in this Node-RED version.", { type: "warning" });
                return;
            }
            var payloadEl = $("#node-input-userPayload");
            RED.editor.editJSON({
                value: payloadEl.val() || "",
                complete: function (value) {
                    var next = value;
                    if (value && typeof value === "object" && value.value !== undefined) {
                        next = value.value;
                    }
                    payloadEl.val(next || "");
                }
            });
        });

        function updateDeliveryWarning() {
            if ($("#node-input-deliveryMode").val() === "buffered") {
                $("#enqueue-persistent-note").hide();
                $("#enqueue-buffered-warning").show();
            } else {
                $("#enqueue-persistent-note").show();
                $("#enqueue-buffered-warning").hide();
            }
        }
        $("#node-input-deliveryMode").on("change", updateDeliveryWarning);
        updateDeliveryWarning();
    }
});
</script>

<script type="text/x-red" data-template-name="enqueue">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-connection"><i class="fa fa-database"></i> DB Connection</label>
        <input type="text" id="node-input-connection" />
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-queueName"><i class="fa fa-list-ul"></i> Queue Name</label>
        <input type="text" id="node-input-queueName">
    </div>
    <div class="form-row">
        <label for="node-input-recipients"><i class="fa fa-users"></i> Recipients</label>
        <input type="text" id="node-input-recipients">
        <div style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;">Optional recipients for multi-consumer queues.</div>
    </div>
    <div class="form-row">
        <label for="node-input-deliveryMode"><i class="fa fa-tachometer"></i> Delivery Mode</label>
        <select id="node-input-deliveryMode" style="width:200px;">
            <option value="persistent">Persistent (default)</option>
            <option value="buffered">Buffered</option>
        </select>
    </div>
    <div id="enqueue-persistent-note" style="margin-left:105px;font-size:11px;color:#888;margin-top:-6px;">
        Messages are written to the queue table and committed to disk — durable across database restarts.
    </div>
    <div id="enqueue-buffered-warning" style="margin-left:105px;font-size:11px;color:#c47a00;margin-top:-6px;display:none;">
        Buffered messages live in Oracle shared memory only — lost on DB restart. Auto-commits immediately after enqueue. Requires thick client mode.
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-payloadType"><i class="fa fa-file-code-o"></i> Payload Type</label>
        <select id="node-input-payloadType" style="width:200px;">
            <option value="json">JSON</option>
            <option value="raw">RAW</option>
            <option value="adt">ADT (Object Type)</option>
        </select>
    </div>
    <div id="enqueue-adt-row" class="form-row" style="display:none">
        <label for="node-input-adtTypeName"><i class="fa fa-cube"></i> Object Type</label>
        <input type="text" id="node-input-adtTypeName" placeholder="SCHEMA.TYPE_NAME">
        <div style="font-size:11px;color:#888;margin-top:2px;">Schema-qualified Oracle object type name (uppercase). e.g. <code>ADMIN.MY_MSG_TYPE</code></div>
    </div>
    <div class="form-row">
        <label for="node-input-userPayload"><i class="fa fa-code"></i> Payload</label>
        <div id="enqueue-payload-hint" style="font-size:11px;color:#888;margin-bottom:4px;"></div>
        <div class="enqueue-payload-toolbar">
            <button type="button" class="red-ui-button red-ui-button-small enqueue-json-editor" title="Open JSON editor">
                <i class="fa fa-ellipsis-h"></i>
            </button>
        </div>
        <textarea id="node-input-userPayload" rows="5" style="width:100%;"></textarea>
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-enableOutput"><i class="fa fa-sign-out"></i> Output</label>
        <input type="checkbox" id="node-input-enableOutput" style="width:auto;">
        <span style="margin-left:6px;font-size:12px;color:#888;">Add output port and pass msg downstream to continue the flow</span>
    </div>
    <input type="hidden" id="node-input-outputs">
</script>

<script type="text/x-red" data-help-name="enqueue">
<p>Enqueues one or more JSON messages into an Oracle Advanced Queue (AQ).</p>

<h3>Configuration</h3>
<dl class="message-properties">
    <dt>DB Connection</dt><dd>Database configuration for authentication.</dd>
    <dt>Queue Name</dt><dd>Name of the AQ to enqueue into.</dd>
    <dt>Recipients</dt><dd>Optional recipients for multi-consumer queues.</dd>
    <dt>Delivery Mode</dt>
    <dd><strong>Persistent</strong> (default): messages are written to the queue table and committed to disk — durable across database restarts.
    <strong>Buffered</strong>: messages are stored in Oracle shared memory only — faster, but lost on DB restart. Auto-commits immediately after enqueue. Requires thick client mode.</dd>
    <dt>Payload Type</dt>
    <dd><strong>JSON</strong> (default): payload is a JS object enqueued as <code>DB_TYPE_JSON</code>.
    <strong>RAW</strong>: payload is a string encoded to a UTF-8 Buffer.
    <strong>ADT</strong>: payload is a JS object instantiated as an Oracle DbObject using the specified Object Type. Field names must match the Oracle type's attribute names (uppercase).</dd>
    <dt>Object Type</dt>
    <dd>ADT only. Schema-qualified Oracle object type name, e.g. <code>ADMIN.MY_MSG_TYPE</code>. Must exist in the database and match the queue's payload type.</dd>
    <dt>Payload</dt>
    <dd>JSON: a single object or array — each element becomes one AQ message. RAW: a plain string encoded to a Buffer. ADT: a single object or array with uppercase field names matching the Oracle type. If empty, <code>msg.payload</code> is used instead. For JSON/ADT payload types, use <code>...</code> to open the JSON editor.</dd>
</dl>

<h3>Outputs</h3>
<p>Output is optional. Enable the <strong>Output</strong> toggle to send a msg after a successful enqueue.</p>
<dl class="message-properties">
    <dt>count <span class="property-type">number</span></dt>
    <dd>Number of messages enqueued.</dd>
    <dt>error <span class="property-type">object</span></dt>
    <dd>Error details on failure: <code>{ message, code }</code>.</dd>
</dl>

<h3>Details</h3>
<p>When <code>msg.transaction.connection</code> exists (from <code>begin-transaction</code>), enqueue uses that shared connection and does not auto-commit. The enqueue is finalized by <code>end-transaction</code> commit/rollback.</p>
<p>Without a transaction connection, enqueue opens its own connection, enqueues, commits, and closes.</p>
<p>Each element of the JSON array is enqueued as a separate AQ message with <code>DB_TYPE_JSON</code> payload type.</p>
</script>
