    inputs: 1, outputs: 1,

<script type="text/x-red" data-template-name="begin-transaction">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-connection"><i class="fa fa-database"></i> DB Connection</label>

    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-timeoutSecs" style="width:130px;"><i class="fa fa-clock-o"></i> Timeout (seconds)</label>

        </div>

<script type="text/x-red" data-help-name="begin-transaction">
<p>Opens a database connection and stores it in <code>msg.transaction.connection</code>
for use by downstream nodes (dequeue, sql, etc.).</p>

<h3>Configuration</h3>
<dl class="message-properties">
    <dt>DB Connection</dt><dd>Database configuration for authentication and connection.</dd>
    <dt>Timeout (seconds)</dt>
    <dd>Optional safety timeout. If the end-transaction node is not reached within this time,
    the connection is automatically rolled back and closed. Set to <code>0</code> for no timeout.
    This prevents connection leaks from stalled or errored flows.</dd>
</dl>

<h3>Outputs</h3>
<dl class="message-properties">
    <dt>msg.transaction.connection <span class="property-type">object</span></dt>
    <dd>The live Oracle DB connection, passed downstream for use by other nodes.</dd>
    <dt>msg.transaction.startedAt <span class="property-type">number</span></dt>
    <dd>Timestamp (ms) when the transaction was opened.</dd>
    <dt>msg.transaction.timedOut <span class="property-type">boolean</span></dt>
    <dd>Set to <code>true</code> when the timeout handler rolls back and closes the transaction.</dd>
    <dt>msg.transaction.endedAt <span class="property-type">number</span></dt>
    <dd>Timestamp (ms) when timeout auto-ended the transaction.</dd>
</dl>

<h3>Details</h3>
<p>Use this node <b>before</b> a <b>dequeue</b> node to create a managed transaction.
The connection stays open until the <b>end transaction</b> node commits and closes it.
If the downstream flow fails before reaching end-transaction, the dequeued message is
never committed and remains available on the queue (automatic rollback on disconnect).</p>
<p>If <code>msg.transaction.connection</code> already exists (e.g. from an upstream
begin-transaction), the existing connection is reused. When timeout is enabled, reuse refreshes
the timeout window so active looping flows do not expire on a stale timer.</p>

<h3>Typical Flow</h3>
<p><code>begin transaction</code> → <code>dequeue</code> → <i>(processing nodes)</i> → <code>end transaction</code></p>
</script>
