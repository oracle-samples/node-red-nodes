<script type="text/javascript">
RED.nodes.registerType("end-transaction", {
    category: "oracle db",
    color: "#4C825C",
    defaults: {
        name: { value: "" },
        action: { value: "commit" }
    },
    inputs: 1, outputs: 1,
    icon: "font-awesome/fa-stop-circle",
    label: function () {
        if (this.name) return this.name;
        return this.action === "rollback" ? "rollback" : "end transaction";
    },
    paletteLabel: "end transaction",
    oneditprepare: function () {
        // Update label hint when action changes
        $("#node-input-action").on("change", function () {
            var action = $(this).val();
            if (action === "rollback") {
                $("#action-hint").text("Rolls back all changes and returns dequeued messages to the queue.");
            } else {
                $("#action-hint").text("Commits all changes and permanently removes dequeued messages from the queue.");
            }
        }).trigger("change");
    }
});
</script>

<script type="text/x-red" data-template-name="end-transaction">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-action"><i class="fa fa-check-circle"></i> Action</label>
        <select id="node-input-action" style="width:200px;">
            <option value="commit">Commit</option>
            <option value="rollback">Rollback</option>
        </select>
        <div style="margin-left:105px;font-size:11px;color:#888;margin-top:4px;" id="action-hint"></div>
    </div>
</script>

<script type="text/x-red" data-help-name="end-transaction">
<p>Commits or rolls back the database transaction and closes the connection.</p>

<h3>Configuration</h3>
<dl class="message-properties">
    <dt>Action</dt>
    <dd><b>Commit</b> (default): Commits all changes made during the transaction. Dequeued messages
    are permanently removed from the queue. SCM API calls and SQL DML are finalized.<br/>
    <b>Rollback</b>: Rolls back all changes. Dequeued messages return to the queue as if they
    were never consumed. Use this on error paths to retry failed messages.<br/>
    If an imported flow contains an unknown action value, the node logs a warning and uses commit behavior.</dd>
</dl>

<h3>Details</h3>
<p>If the transaction already timed out in <b>begin transaction</b>, this node sets status to
<code>timed out</code> and calls <code>done(new Error("Transaction timed out"))</code> so Catch
nodes can handle the failure path explicitly.</p>
<p>If the same message reaches this node more than once after a transaction has already ended, it
sets status to <code>already ended</code> and exits without attempting a second commit/rollback.</p>

<h3>Typical Flows</h3>
<p><b>Success path commits, error path rolls back:</b></p>
<pre>begin transaction → dequeue → fusion-request → end transaction (commit)
                                     ↓ (error)
                               catch → end transaction (rollback)</pre>
<p>If fusion-request succeeds, the message is committed and removed. If it fails, the
catch node routes to a rollback end-transaction, and the message returns to the queue
for retry.</p>
</script>
