<script type="text/javascript">
RED.nodes.registerType("db-connection", {
    category: "config",
    color: "#4C825C",
    defaults: {
        usePool: { value: false },
        authType: { value: "basic" },
        tnsString: { value: "" },
        externalAuth: { value: true },
        scope: { value: "" },
        configFileLocation: { value: "" },
        profile: { value: "" },
        fingerprint: { value: "" },
        privateKeyLocation: { value: "" },
        regionId: { value: "" },
        tenancyOCID: { value: "" },
        userOCID: { value: "" },
        poolMin: { value: "" },
        poolMax: { value: "" },
        poolIncrement: { value: "" },
        queueTimeout: { value: "" }
    },
    credentials: {
        username: { type: "text" },
        password: { type: "password" },
        passphrase: { type: "password" }
    },
    label: function () {
        return this.tnsString ? this.tnsString.substring(0, 30) : "DB Connection";
    },
    oneditprepare: function () {
        var nodeId = this.id;

        function updateAuthFields() {
            var type = $("#node-config-input-authType").val();
            var usePool = $("#node-config-input-usePool").is(":checked");
            $(".auth-section").hide();
            $(".external-auth").hide();
            $(".pool-options").toggle(usePool);
            if (type === "basic") $(".auth-basic").show();
            if (type === "config") { $(".auth-config").show(); $(".external-auth").show(); }
            if (type === "instancePrincipal") { $(".auth-ip").show(); $(".external-auth").show(); }
            if (type === "simple") { $(".auth-simple").show(); $(".external-auth").show(); }
        }
        updateAuthFields();
        $("#node-config-input-authType").on("change", updateAuthFields);
        $("#node-config-input-usePool").on("change", updateAuthFields);

        // Test Connection button
        $("#btn-test-connection").on("click", function () {
            var btn = $(this);
            var resultEl = $("#test-connection-result");
            btn.prop("disabled", true);
            resultEl.text("Testing...").css("color", "#888");

            $.ajax({
                url: "db-connection/" + nodeId + "/test",
                type: "POST",
                success: function (data) {
                    if (data.success) {
                        resultEl.text("✓ " + data.message).css("color", "#2ca02c");
                    } else {
                        resultEl.text("✗ " + data.message).css("color", "#d62728");
                    }
                },
                error: function (err) {
                    var msg = "Test failed";
                    if (err.status === 404) msg = "Deploy the flow first, then test";
                    resultEl.text("✗ " + msg).css("color", "#d62728");
                },
                complete: function () {
                    btn.prop("disabled", false);
                }
            });
        });
    }
});
</script>

<script type="text/x-red" data-template-name="db-connection">
    <fieldset><legend style="font-size:12px;font-weight:bold;color:#555;">Authentication</legend>
    <div class="form-row">
        <label for="node-config-input-authType"><i class="fa fa-key"></i> Auth Type</label>
        <select id="node-config-input-authType" style="width:200px;">
            <option value="basic">Basic (User/Pass)</option>
            <option value="config">Config File Auth</option>
            <option value="instancePrincipal">Instance Principal</option>
            <option value="simple">Simple Auth</option>
        </select>
    </div>
    <div class="form-row external-auth">
        <label for="node-config-input-externalAuth" style="width:120px;"><i class="fa fa-shield"></i> External Auth</label>
        <input type="checkbox" id="node-config-input-externalAuth" style="margin-left:0;width:auto;">
    </div>
    <!-- BASIC AUTH -->
    <div class="auth-section auth-basic">
        <div class="form-row">
            <label for="node-config-input-username"><i class="fa fa-user"></i> Username</label>
            <input type="text" id="node-config-input-username">
        </div>
        <div class="form-row">
            <label for="node-config-input-password"><i class="fa fa-lock"></i> Password</label>
            <input type="password" id="node-config-input-password">
        </div>
    </div>
    <!-- CONFIG FILE AUTH -->
    <div class="auth-section auth-config">
        <div class="form-row">
            <label for="node-config-input-configFileLocation"><i class="fa fa-file-text-o"></i> Config File</label>
            <input type="text" id="node-config-input-configFileLocation" placeholder="/home/opc/.oci/config">
        </div>
        <div class="form-row">
            <label for="node-config-input-profile"><i class="fa fa-id-card-o"></i> Profile</label>
            <input type="text" id="node-config-input-profile" placeholder="DEFAULT">
        </div>
    </div>
    <!-- SIMPLE AUTH -->
    <div class="auth-section auth-simple">
        <div class="form-row">
            <label for="node-config-input-fingerprint"><i class="fa fa-fingerprint"></i> Fingerprint</label>
            <input type="text" id="node-config-input-fingerprint">
        </div>
        <div class="form-row">
            <label for="node-config-input-privateKeyLocation"><i class="fa fa-key"></i> Private Key Path</label>
            <input type="text" id="node-config-input-privateKeyLocation">
        </div>
        <div class="form-row">
            <label for="node-config-input-passphrase"><i class="fa fa-lock"></i> Passphrase</label>
            <input type="password" id="node-config-input-passphrase">
        </div>
        <div class="form-row">
            <label for="node-config-input-regionId"><i class="fa fa-map-marker"></i> Region</label>
            <input type="text" id="node-config-input-regionId">
        </div>
        <div class="form-row">
            <label for="node-config-input-userOCID"><i class="fa fa-user"></i> User OCID</label>
            <input type="text" id="node-config-input-userOCID">
        </div>
        <div class="form-row">
            <label for="node-config-input-tenancyOCID"><i class="fa fa-building"></i> Tenancy OCID</label>
            <input type="text" id="node-config-input-tenancyOCID">
        </div>
    </div>
    <!-- SHARED SCOPE -->
    <div class="auth-section auth-config auth-ip">
        <div class="form-row">
            <label for="node-config-input-scope"><i class="fa fa-shield"></i> Scope</label>
            <input type="text" id="node-config-input-scope">
        </div>
    </div>
    </fieldset>

    <fieldset><legend style="font-size:12px;font-weight:bold;color:#555;">Connection</legend>
    <div class="auth-section auth-basic auth-config auth-ip auth-simple">
        <div class="form-row">
            <label for="node-config-input-tnsString"><i class="fa fa-server"></i> TNS String</label>
            <textarea id="node-config-input-tnsString" rows="5" style="width:100%;" placeholder="(description=(address=(protocol=tcps)...))"></textarea>
        </div>
    </div>
    <div class="form-row">
        <button type="button" class="red-ui-button" id="btn-test-connection" style="margin-left:105px;">
            <i class="fa fa-plug"></i> Test Connection
        </button>
        <span id="test-connection-result" style="margin-left:10px;font-size:12px;"></span>
    </div>
    </fieldset>

    <fieldset><legend style="font-size:12px;font-weight:bold;color:#555;">Connection Pool</legend>
    <div class="form-row">
        <label for="node-config-input-usePool" style="width:120px;"><i class="fa fa-database"></i> Use Pool</label>
        <input type="checkbox" id="node-config-input-usePool" style="margin-left:0;width:auto;">
    </div>
    <div class="form-row pool-options">
        <label for="node-config-input-poolMin"><i class="fa fa-minus-circle"></i> Pool Min</label>
        <input type="number" id="node-config-input-poolMin" min="0" style="width:80px;">
    </div>
    <div class="form-row pool-options">
        <label for="node-config-input-poolMax"><i class="fa fa-plus-circle"></i> Pool Max</label>
        <input type="number" id="node-config-input-poolMax" min="1" style="width:80px;">
    </div>
    <div class="form-row pool-options">
        <label for="node-config-input-poolIncrement"><i class="fa fa-sort-numeric-asc"></i> Pool Increment</label>
        <input type="number" id="node-config-input-poolIncrement" min="1" style="width:80px;">
    </div>
    <div class="form-row pool-options">
        <label for="node-config-input-queueTimeout"><i class="fa fa-clock-o"></i> Queue Timeout (ms)</label>
        <input type="number" id="node-config-input-queueTimeout" min="0" style="width:100px;">
    </div>
    </fieldset>
</script>
