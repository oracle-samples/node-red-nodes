<script type="text/javascript">
RED.nodes.registerType("db-connection", {
    category: "config",
    color: "#4C825C",
    defaults: {
        usePool: { value: false },
        authType: { value: "basic" },
        driverMode: { value: "thick" },
        tnsString: { value: "" },
        walletLocation: { value: "" },
        externalAuth: { value: true },
        scope: { value: "" },
        configFileLocation: { value: "" },
        profile: { value: "" },
        fingerprint: { value: "" },
        privateKeyLocation: { value: "" },
        regionId: { value: "" },
        tenancyOCID: { value: "" },
        userOCID: { value: "" },
        poolMin: { value: "" },
        poolMax: { value: "" },
        poolIncrement: { value: "" },
        queueTimeout: { value: "" },
        proxyUser: { value: "" }
    },
    credentials: {
        username: { type: "text" },
        password: { type: "password" },
        passphrase: { type: "password" }
    },
    label: function () {
        var labels = { basic: "Basic", config: "DB Token (Config File)", instancePrincipal: "DB Token (Instance Principal)", resourcePrincipal: "DB Token (Resource Principal)", sessionToken: "DB Token (Session Token)", simple: "DB Token (API Key)" };
        var authLabel = labels[this.authType] || this.authType;
        return this.tnsString ? authLabel + " (" + this.tnsString.substring(0, 20) + ")" : "DB Connection";
    },
    oneditprepare: function () {
        var nodeId = this.id;

        function updateAuthFields() {
            var type = $("#node-config-input-authType").val();
            var usePool = $("#node-config-input-usePool").is(":checked");
            $(".auth-section").hide();
            $(".external-auth").hide();
            $(".pool-options").toggle(usePool);
            if (type === "basic") $(".auth-basic").show();
            if (type === "config") { $(".auth-config").show(); $(".external-auth").show(); $("#profile-caption").text(""); }
            if (type === "instancePrincipal") { $(".auth-ip").show(); $(".external-auth").show(); }
            if (type === "resourcePrincipal") { $(".auth-rp").show(); $(".external-auth").show(); }
            if (type === "sessionToken") { $(".auth-session").show(); $(".auth-session-scope").show(); $(".external-auth").show(); $("#profile-caption").text("Enter the profile name you used when running oci session authenticate."); }
            if (type === "simple") { $(".auth-simple").show(); $(".external-auth").show(); }
        }
        updateAuthFields();
        $("#node-config-input-authType").on("change", updateAuthFields);
        $("#node-config-input-usePool").on("change", updateAuthFields);

        // Warn when fields are changed since last deploy.
        // Deferred so Node-RED's own field population during init doesn't trigger the warning.
        setTimeout(function () {
            $("[id^='node-config-input-']").on("change input", function () {
                $("#deploy-warning")
                    .css({ background: "#fff3cd", "border-color": "#ffc107", color: "#856404" })
                    .html('<i class="fa fa-exclamation-triangle"></i> <strong>Changes detected</strong> — click <strong>Update</strong> then <strong>Deploy</strong> before testing.');
            });
        }, 0);

        // Test Connection button
        $("#btn-test-connection").on("click", function () {
            var btn = $(this);
            var resultEl = $("#test-connection-result");
            btn.prop("disabled", true);
            resultEl.text("Testing...").css("color", "#888");

            $.ajax({
                url: "db-connection/" + nodeId + "/test",
                type: "POST",
                success: function (data) {
                    if (data.success) {
                        resultEl.text("✓ " + data.message).css("color", "#2ca02c");
                    } else {
                        resultEl.text("✗ " + data.message).css("color", "#d62728");
                    }
                },
                error: function (err) {
                    var msg = "Test failed";
                    if (err.status === 404) msg = "Deploy the flow first, then test";
                    resultEl.text("✗ " + msg).css("color", "#d62728");
                },
                complete: function () {
                    btn.prop("disabled", false);
                }
            });
        });
    }
});
</script>

<script type="text/html" data-help-name="db-connection">
<p>Shared configuration node for connecting to Oracle Database. All DB nodes (sql, enqueue, dequeue, begin-transaction) reference this config node.</p>

<h3>Authentication</h3>
<dl class="message-properties">
    <dt>Basic</dt>
    <dd>Direct database username and password. Does not use OCI IAM. Suitable for on-premises databases or environments where IAM is not available.</dd>

    <dt>DB Token — Config File</dt>
    <dd>Uses an OCI config file with an API key to obtain a DB-scoped IAM token. The config file must contain <code>tenancy</code>, <code>user</code>, <code>fingerprint</code>, <code>key_file</code>, and <code>region</code>. Defaults to <code>~/.oci/config</code> with the <code>DEFAULT</code> profile.</dd>

    <dt>DB Token — Instance Principal</dt>
    <dd>Uses the OCI Instance Principal identity of the compute instance running Node-RED. No credentials are required — the instance metadata service provides authentication automatically. Only works on OCI compute instances.</dd>

    <dt>DB Token — Resource Principal</dt>
    <dd>Uses the OCI Resource Principal identity of the OCI resource running Node-RED (e.g. OCI Functions, OKE pods). No credentials are required — the resource's dynamic group membership and assigned policies determine access. Only works within OCI environments that support Resource Principal injection.</dd>

    <dt>DB Token — Session Token</dt>
    <dd>Uses an OCI CLI session token generated by <code>oci session authenticate</code>. The OCI config file must contain a <code>security_token_file</code> entry pointing to the generated token file. Session tokens expire; refresh them with <code>oci session refresh</code> before they expire. Useful for local development without storing long-lived API keys.</dd>

    <dt>DB Token — API Key</dt>
    <dd>Explicit API key authentication using tenancy OCID, user OCID, fingerprint, private key path, and region. Equivalent to Config File auth but with credentials entered directly in the node editor rather than read from a file.</dd>
</dl>

<h3>Connection</h3>
<dl class="message-properties">
    <dt>TNS String</dt>
    <dd>Oracle connect descriptor for the target database. Obtain this from the OCI Console under your Autonomous Database → Database Connection, or from your DBA.</dd>
    <dt>Wallet Path</dt>
    <dd>Optional directory path used for Oracle wallet and network config lookup. This is passed as node-oracledb connection <code>configDir</code> and <code>walletLocation</code> so both Thick and Thin mode can resolve wallet-based connections.</dd>
    <dt>External Auth</dt>
    <dd>Must be enabled for all DB Token auth types. Instructs the driver to use externally-provided IAM credentials rather than a username and password.</dd>
    <dt>Driver Mode</dt>
    <dd>Select <code>Thick</code> to use Oracle Client libraries, or <code>Thin</code> to use the pure JavaScript driver. This setting is process-wide in Node-RED and must be the same across all active db-connection nodes.</dd>
    <dt>Scope</dt>
    <dd>Optional. Restricts the DB token to a specific compartment or database. Leave blank to allow access to all databases in the tenancy (<code>urn:oracle:db::id::*</code>).</dd>
    <dt>Proxy User</dt>
    <dd>Optional. Specifies a database proxy user for DB Token auth. Proxy User with DB Token auth is not supported in Thick mode; use Thin mode or leave Proxy User empty.</dd>
</dl>

<h3>Connection Pool</h3>
<p>Enables a reusable connection pool. Recommended for flows that execute frequent queries. Set <b>Pool Min</b> and <b>Pool Max</b> to control the number of open connections; <b>Pool Increment</b> controls how many are added when the pool grows; <b>Queue Timeout</b> is the maximum milliseconds a request waits for a connection before failing.</p>

<h3>Test Connection</h3>
<p>Executes <code>SELECT 1 FROM DUAL</code> to verify connectivity. The node must be deployed before the test button becomes active — click <b>Update</b> then <b>Deploy</b> first.</p>
</script>
