<script type="text/javascript">
var sqlBindsMappingEditorStyles = '<style id="sql-binds-mapping-editor-styles">' +
    '.bind-value-editor-wrap{display:flex;align-items:stretch;}' +
    '.bind-value-editor-wrap .bind-value{border-top-right-radius:0;border-bottom-right-radius:0;}' +
    '.bind-value-editor-wrap .bind-jsonata-edit{' +
        'width:30px;min-width:30px;padding:0;margin-left:-1px;border-top-left-radius:0;border-bottom-left-radius:0;' +
        'display:inline-flex;align-items:center;justify-content:center;' +
    '}' +
    '.bind-value-editor-wrap .bind-jsonata-edit i{font-size:11px;}' +
'</style>';
if (!document.getElementById("sql-binds-mapping-editor-styles")) {
    $("head").append(sqlBindsMappingEditorStyles);
}

RED.nodes.registerType("sql", {
    category: "oracle db",
    paletteLabel: "sql",
    defaults: {
        name: { value: "" },
        connection: { type: "db-connection", required: true },
        sqlSource: { value: "editor" },
        sqlcmd: { value: "" },
        maxrows: { value: 1000 },
        bindsSource: { value: "editor" },
        binds: { value: "" },
        bindsMappings: { value: "[]" }
    },
    inputs: 1, outputs: 1,
    color: "#4C825C",
    icon: "font-awesome/fa-database",
    label: function () { return this.name || "sql"; },
    oneditprepare: function () {
        function toggleSources() {
            var sqlSrc = $("#node-input-sqlSource").val();
            var sqlIsEditor = (sqlSrc === "editor");
            $("#node-input-sqlcmd").prop("disabled", !sqlIsEditor);
            $("#sql-msg-hint").toggle(!sqlIsEditor);

            var bindsSrc = $("#node-input-bindsSource").val();
            var bindsIsEditor = (bindsSrc === "editor");
            $("#binds-mapping-container-wrapper").toggle(bindsIsEditor);
            $("#binds-msg-hint").toggle(!bindsIsEditor);
        }
        var mappings = [];
        try { mappings = JSON.parse(this.bindsMappings || "[]"); } catch (e) { mappings = []; }
        if (!Array.isArray(mappings)) mappings = [];
        sqlBindsMappingEditor.init({ bindings: mappings });
        toggleSources();
        $("#node-input-sqlSource").on("change", toggleSources);
        $("#node-input-bindsSource").on("change", toggleSources);
    },
    oneditsave: function () {
        this.bindsMappings = sqlBindsMappingEditor.save();
    }
});

var sqlBindsMappingEditor = (function () {
    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    var sourceLabelMap = {
        static: "Value",
        number: "Number",
        boolean: "Boolean",
        date: "Date",
        msg: "Property Path",
        jsonata: "Expression"
    };

    var sourcePlaceholderMap = {
        static: "e.g. OPEN",
        number: "e.g. 100",
        boolean: "true or false",
        date: "SYSDATE or e.g. 2026-04-02T10:30:00Z",
        msg: "e.g. payload.assetId",
        jsonata: "e.g. payload.items[0].id"
    };

    function normalizeRowValue(sourceType, rawValue) {
        var value = (rawValue === undefined || rawValue === null) ? "" : String(rawValue);
        if (sourceType === "date" && !value.trim()) {
            return "SYSDATE";
        }
        return value;
    }

    function openJsonataEditor(valueInput) {
        if (!(RED.editor && RED.editor.editExpression)) {
            RED.notify("JSONata editor is not available in this Node-RED version.", { type: "warning" });
            return;
        }
        RED.editor.editExpression({
            value: valueInput.val() || "",
            mode: "jsonata",
            type: "jsonata",
            complete: function (value) {
                var next = value;
                if (value && typeof value === "object" && value.value !== undefined) {
                    next = value.value;
                }
                valueInput.val(next || "");
            }
        });
    }

    function addRow(m) {
        var sourceType = m.sourceType || "static";
        var initialValue = normalizeRowValue(sourceType, m.value);
        var row = $(
            '<div class="binds-mapping-row" style="border:1px solid #ddd;border-radius:4px;padding:8px;margin-bottom:6px;background:#fafafa;">' +
              '<div style="display:flex;align-items:center;gap:8px;">' +
                '<div class="binds-drag-handle" style="cursor:grab;padding:4px 2px;color:#999;font-size:16px;" title="Drag to reorder">&#9776;</div>' +
                '<div style="flex:1;"><label style="font-size:11px;color:#666;">Bind Variable</label>' +
                  '<input type="text" class="bind-name" value="' + escapeHtml(m.bindName || "") + '" placeholder="e.g. id" style="width:100%;" /></div>' +
                '<div style="width:150px;"><label style="font-size:11px;color:#666;">Source</label>' +
                  '<select class="bind-source-type" style="width:100%;">' +
                    '<option value="static"' + (sourceType === "static" ? " selected" : "") + '>static text</option>' +
                    '<option value="number"' + (sourceType === "number" ? " selected" : "") + '>number</option>' +
                    '<option value="boolean"' + (sourceType === "boolean" ? " selected" : "") + '>boolean</option>' +
                    '<option value="date"' + (sourceType === "date" ? " selected" : "") + '>date</option>' +
                    '<option value="msg"' + (sourceType === "msg" ? " selected" : "") + '>msg property</option>' +
                    '<option value="jsonata"' + (sourceType === "jsonata" ? " selected" : "") + '>JSONata (J:)</option>' +
                  '</select></div>' +
                '<div style="flex:1;"><label style="font-size:11px;color:#666;" class="bind-value-label">' + (sourceLabelMap[sourceType] || "Value") + '</label>' +
                  '<div class="bind-value-editor-wrap">' +
                    '<input type="text" class="bind-value" value="' + escapeHtml(initialValue) + '" placeholder="' + (sourcePlaceholderMap[sourceType] || "") + '" style="width:100%;" />' +
                    '<button type="button" class="red-ui-button bind-jsonata-edit" title="Open JSONata expression editor" style="' + (sourceType === "jsonata" ? "" : "display:none;") + '">' +
                      '<i class="fa fa-ellipsis-h"></i>' +
                    '</button>' +
                  '</div></div>' +
                '<div style="padding-top:14px;"><button type="button" class="red-ui-button red-ui-button-small" onclick="$(this).closest(\'.binds-mapping-row\').remove();">&times;</button></div>' +
              '</div>' +
            '</div>'
        );

        row.find(".bind-jsonata-edit").on("click", function () {
            openJsonataEditor(row.find(".bind-value"));
        });

        row.find(".bind-source-type").on("change", function () {
            var type = $(this).val();
            var valueInput = row.find(".bind-value");
            row.find(".bind-value-label").text(sourceLabelMap[type] || "Value");
            valueInput.attr("placeholder", sourcePlaceholderMap[type] || "");
            row.find(".bind-jsonata-edit").toggle(type === "jsonata");
            if (type === "date" && !String(valueInput.val() || "").trim()) {
                valueInput.val("SYSDATE");
            }
        });
        $("#binds-mapping-container").append(row);
    }

    function init(node) {
        $("#binds-mapping-container").empty();
        var list = Array.isArray(node.bindings) ? node.bindings : [];
        list.forEach(function (m) { addRow(m); });

        $("#btn-add-bind-mapping").off("click").on("click", function () {
            addRow({ bindName: "", sourceType: "static", value: "" });
        });

        $("#binds-mapping-container").sortable({
            handle: ".binds-drag-handle", axis: "y", cursor: "grabbing",
            opacity: 0.7, placeholder: "binds-sortable-placeholder", tolerance: "pointer"
        });
    }

    function save() {
        var mappings = [];
        $("#binds-mapping-container .binds-mapping-row").each(function () {
            var row = $(this);
            var mapping = {
                bindName: row.find(".bind-name").val().trim(),
                sourceType: row.find(".bind-source-type").val(),
                value: row.find(".bind-value").val().trim()
            };
            if (mapping.bindName) {
                mappings.push(mapping);
            }
        });
        return JSON.stringify(mappings);
    }

    return { init: init, save: save };
})();
</script>

<script type="text/x-red" data-template-name="sql">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-connection"><i class="fa fa-database"></i> DB Connection</label>
        <input type="text" id="node-input-connection">
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-sqlSource"><i class="fa fa-toggle-on"></i> SQL Source</label>
        <select id="node-input-sqlSource" style="width:150px;">
            <option value="editor">Editor</option>
            <option value="msg">msg.sql</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-sqlcmd"><i class="fa fa-code"></i> SQL</label>
        <textarea id="node-input-sqlcmd" rows="6" style="width:100%;font-family:monospace;font-size:12px;"></textarea>
        <div id="sql-msg-hint" style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;display:none;">
            SQL will be read from <code>msg.sql</code> at runtime.
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-bindsSource"><i class="fa fa-toggle-on"></i> Binds Source</label>
        <select id="node-input-bindsSource" style="width:150px;">
            <option value="editor">Editor</option>
            <option value="msg">msg.binds</option>
        </select>
    </div>
    <div class="form-row" id="binds-mapping-container-wrapper">
        <label><i class="fa fa-list"></i> Binds Mapping</label>
        <div style="margin-left:105px;font-size:11px;color:#888;margin-bottom:4px;">
            Define bind variables to static values, numbers, booleans, dates, msg properties, and JSONata expressions. Drag &#9776; to reorder.
        </div>
        <div id="binds-mapping-container" style="margin-left:20px;margin-right:20px;"></div>
        <div style="margin-left:20px;margin-top:4px;">
            <button type="button" class="red-ui-button red-ui-button-small" id="btn-add-bind-mapping">+ Add Bind</button>
        </div>
    </div>
    <div class="form-row">
        <div id="binds-msg-hint" style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;display:none;">
            Binds will be read from <code>msg.binds</code> at runtime (JSON array or object).
        </div>
    </div>
    <div class="form-row">
        <label for="node-input-maxrows"><i class="fa fa-sort-numeric-asc"></i> Max Rows</label>
        <input type="number" id="node-input-maxrows" min="1" max="10000" style="width:80px;">
    </div>
</script>

<script type="text/x-red" data-help-name="sql">
<p>Executes a SQL statement against an Oracle Database.</p>

<h3>Configuration</h3>
<dl class="message-properties">
    <dt>DB Connection</dt><dd>Database configuration for authentication.</dd>
    <dt>SQL Source</dt>
    <dd><code>Editor</code> — uses the SQL written in the textarea below.
    <code>msg.sql</code> — reads the SQL statement from <code>msg.sql</code> at runtime,
    allowing dynamic queries from upstream nodes. Editor mode blocks semicolon-chained multi-statement SQL and accepts a single statement (anonymous PL/SQL blocks are allowed).</dd>
    <dt>SQL</dt><dd>The SQL statement (when SQL Source is Editor).</dd>
    <dt>Binds Source</dt>
    <dd><code>Editor</code> — uses the Binds Mapping rows below.
    <code>msg.binds</code> — reads bind values from <code>msg.binds</code> at runtime.</dd>
    <dt>Binds Mapping</dt><dd>Define named bind variables row-by-row. Each row sets a bind variable name and a source type:
    static text, number, boolean, date, msg property path, or JSONata expression. For JSONata rows, use the <code>...</code> button to open the JSONata editor. Date rows default to <code>SYSDATE</code> (current runtime time) and can be overridden with an explicit datetime string.</dd>
    <dt>Max Rows</dt><dd>Maximum rows returned for SELECT queries (default: 1000, max: 10000).</dd>
</dl>

<h3>Outputs</h3>
<dl class="message-properties">
    <dt>payload <span class="property-type">array</span></dt>
    <dd>Array of row objects for SELECT queries.</dd>
    <dt>error <span class="property-type">object</span></dt>
    <dd>Error details on failure: <code>{ message, code }</code>.</dd>
</dl>

<h3>Details</h3>
<p>Opens its own connection, executes the SQL, and closes the connection.</p>
<p><b>Important:</b> This node uses <code>autoCommit: false</code>. SELECT queries
work as expected. DML statements (INSERT, UPDATE, DELETE) are <b>not committed</b>
and will be rolled back when the connection closes. To commit DML, use a PL/SQL block
with an explicit <code>COMMIT</code>, or use the begin/end transaction nodes.</p>
</script>
