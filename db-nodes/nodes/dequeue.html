<script type="text/javascript">
RED.nodes.registerType("dequeue", {
    category: "oracle db",
    color: "#4C825C",
    defaults: {
        name: { value: "" },
        connection: { type: "db-connection", required: true },
        mode: { value: "transactional" },
        inputs: { value: 1 },
        queueName: { value: "", required: true },
        subscriber: { value: "" },
        wait: { value: 0 },
        waitForever: { value: false },
        batchSize: { value: 1 },
        deqMode: { value: "remove" },
        payloadType: { value: "json" },
        adtTypeName: { value: "" },
        retryEnabled: { value: true },
        retryDelayMs: { value: 5000 },
        maxRetries: { value: 0 }
    },
    inputs: 1, outputs: 1,
    icon: "font-awesome/fa-download",
    label: function () { return this.name || "dequeue"; },
    paletteLabel: "dequeue",
    oneditprepare: function () {
        function updateMode() {
            var isContinuous = $("#node-input-mode").val() === "continuous";
            $("#wait-section").toggle(!isContinuous);
            $("#continuous-note").toggle(isContinuous);
            $("#retry-section").toggle(isContinuous);
            updateRetryRows();
        }
        updateMode();
        $("#node-input-mode").on("change", updateMode);

        // Toggle wait field based on waitForever checkbox
        function updateWait() {
            if ($("#node-input-waitForever").is(":checked")) {
                $("#wait-row").hide();
            } else {
                $("#wait-row").show();
            }
        }
        updateWait();
        $("#node-input-waitForever").on("change", updateWait);

        function updateRetryRows() {
            var retriesEnabled = $("#node-input-retryEnabled").is(":checked");
            $("#retry-options").toggle(retriesEnabled);
        }
        updateRetryRows();
        $("#node-input-retryEnabled").on("change", updateRetryRows);

        function updatePayloadType() {
            $("#dequeue-adt-row").toggle($("#node-input-payloadType").val() === "adt");
        }
        $("#node-input-payloadType").on("change", updatePayloadType);
        updatePayloadType();

        // Update dequeue mode hint
        $("#node-input-deqMode").on("change", function() {
            var mode = $(this).val();
            var hints = {
                "remove": "Message is permanently removed from the queue on commit. Use this for normal message consumption.",
                "browse": "Message is read but stays in the queue. No lock, no removal. Use for monitoring or inspecting queue contents.",
                "locked": "Message is locked for processing but stays in the queue on commit. Use when you need to inspect before deciding to remove."
            };
            $("#deq-mode-hint").text(hints[mode] || "");
        }).trigger("change");
    },
    oneditsave: function () {
        this.inputs = ($("#node-input-mode").val() === "continuous") ? 0 : 1;
    }
});
</script>

<script type="text/x-red" data-help-name="dequeue">
<p>Dequeues messages from an Oracle Advanced Queue (AQ).</p>

<h3>Configuration</h3>
<dl class="message-properties">
    <dt>DB Connection</dt><dd>Shared database connection configuration.</dd>
    <dt>Mode</dt><dd><b>Transactional</b> (default) — triggered by an incoming message; supports begin/end-transaction for rollback protection. <b>Continuous</b> — starts automatically on deploy, listens indefinitely, commits immediately after each batch; no input port.</dd>
    <dt>Queue Name</dt><dd>Schema-qualified queue name, e.g. <code>ADMIN.MY_QUEUE</code>.</dd>
    <dt>Subscriber</dt><dd>Consumer name for multi-consumer queues. Leave empty for single-consumer queues.</dd>
    <dt>Payload Type</dt><dd><b>JSON</b> — plain JS object. <b>RAW</b> — Buffer. <b>ADT</b> — Oracle object type, automatically converted to a plain JS object with uppercase attribute names.</dd>
    <dt>Dequeue Mode</dt><dd><b>Remove</b> (default) — message permanently deleted on commit. <b>Browse</b> — message read without locking or removal. <b>Locked</b> — message locked for processing but not removed on commit.</dd>
    <dt>Block Indefinitely / Wait (seconds)</dt><dd>In Transactional mode, how long to wait for a message. 0 = return immediately if empty.</dd>
    <dt>Enable Retries / Retry Delay / Max Retries</dt><dd>In Continuous mode, controls reconnect behaviour on DB errors. Max Retries 0 = unlimited.</dd>
</dl>

<h3>Outputs</h3>
<dl class="message-properties">
    <dt>payload <span class="property-type">object | Buffer | DbObject</span></dt>
    <dd>The dequeued message payload. Type depends on Payload Type setting.</dd>
    <dt>dequeued <span class="property-type">object | Buffer | DbObject</span></dt>
    <dd>Same as <code>payload</code> — available for use with SCM payload mappings.</dd>
    <dt>error <span class="property-type">object</span></dt>
    <dd>Error details on failure: <code>{ message, code }</code>.</dd>
</dl>

<h3>Details</h3>
<p>In <b>Transactional</b> mode, if <code>msg.transaction.connection</code> is present (set by a begin-transaction node), the dequeue uses that shared connection and does not auto-commit — the message stays locked until end-transaction commits or rolls back. Without a transaction context, dequeue creates its own connection, auto-commits, and closes.</p>
<p>In <b>Continuous</b> mode, the node starts on deploy and listens using <code>AQ_DEQ_WAIT_FOREVER</code>. On redeploy or stop, the blocking call is interrupted for a prompt shutdown. Commits immediately after each batch — rollback protection is not available.</p>
</script>
