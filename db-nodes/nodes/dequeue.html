<script type="text/javascript">
RED.nodes.registerType("dequeue", {
    category: "oracle db",
    color: "#4C825C",
    defaults: {
        name: { value: "" },
        connection: { type: "db-connection", required: true },
        queueName: { value: "", required: true },
        subscriber: { value: "" },
        wait: { value: 0 },
        waitForever: { value: false },
        batchSize: { value: 1 },
        deqMode: { value: "remove" }
    },
    inputs: 1, outputs: 1,
    icon: "font-awesome/fa-download",
    label: function () { return this.name || "dequeue"; },
    paletteLabel: "dequeue",
    oneditprepare: function () {
        // Toggle wait field based on waitForever checkbox
        function updateWait() {
            if ($("#node-input-waitForever").is(":checked")) {
                $("#wait-row").hide();
            } else {
                $("#wait-row").show();
            }
        }
        updateWait();
        $("#node-input-waitForever").on("change", updateWait);

        // Update mode hint
        $("#node-input-deqMode").on("change", function () {
            var mode = $(this).val();
            var hints = {
                "remove": "Message is permanently removed from the queue on commit. Use this for normal message consumption.",
                "browse": "Message is read but stays in the queue. No lock, no removal. Use for monitoring or inspecting queue contents.",
                "locked": "Message is locked for processing but stays in the queue on commit. Use when you need to inspect before deciding to remove."
            };
            $("#deq-mode-hint").text(hints[mode] || "");
        }).trigger("change");
    }
});
</script>

<script type="text/x-red" data-template-name="dequeue">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-connection"><i class="fa fa-database"></i> DB Connection</label>
        <input type="text" id="node-input-connection">
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-queueName"><i class="fa fa-inbox"></i> Queue Name</label>
        <input type="text" id="node-input-queueName" placeholder="SCHEMA.JSON_QUEUE">
    </div>
    <div class="form-row">
        <label for="node-input-subscriber"><i class="fa fa-user"></i> Subscriber</label>
        <input type="text" id="node-input-subscriber" placeholder="(optional) e.g. ALL_COMMANDS">
        <div style="margin-left:105px;font-size:11px;color:#888;margin-top:2px;">
            Consumer name for multi-consumer queues. Leave empty for single-consumer queues.
        </div>
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-deqMode"><i class="fa fa-cog"></i> Dequeue Mode</label>
        <select id="node-input-deqMode" style="width:200px;">
            <option value="remove">Remove</option>
            <option value="browse">Browse</option>
            <option value="locked">Locked</option>
        </select>
        <div style="margin-left:105px;font-size:11px;color:#888;margin-top:4px;" id="deq-mode-hint"></div>
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-waitForever"><i class="fa fa-hourglass"></i> Block Indefinitely</label>
        <input type="checkbox" id="node-input-waitForever" style="width:auto;vertical-align:middle;">
        <span style="font-size:12px;color:#666;"> Wait forever for messages</span>
    </div>
    <div class="form-row" id="wait-row">
        <label for="node-input-wait"><i class="fa fa-clock-o"></i> Wait (seconds)</label>
        <input type="number" id="node-input-wait" min="0" value="0" style="width:100px;">
        <span style="font-size:12px;color:#666;margin-left:8px;">0 = return immediately if no messages</span>
    </div>
    <div class="form-row">
        <label for="node-input-batchSize"><i class="fa fa-list-ol"></i> Batch Size</label>
        <input type="number" id="node-input-batchSize" min="1" value="1" style="width:100px;">
    </div>
</script>

<script type="text/x-red" data-help-name="dequeue">
<p>Dequeues messages from an Oracle Advanced Queue (AQ).</p>

<h3>Dequeue Modes</h3>
<dl class="message-properties">
    <dt>Remove (default)</dt>
    <dd>Reads the message and marks it for removal. When the transaction commits
    (either via end-transaction or auto-commit in standalone mode), the message is
    permanently deleted from the queue. This is the normal mode for consuming messages.</dd>
    <dt>Browse</dt>
    <dd>Reads the message without locking or removing it. The message stays in the
    queue and can be read again by the same or other subscribers. Use this to inspect
    queue contents without consuming them — like peeking at mail without taking it
    out of the mailbox.</dd>
    <dt>Locked</dt>
    <dd>Reads the message and locks it so no other consumer can access it, but does
    not remove it on commit. The lock is released when the transaction ends. Use this
    when you need to inspect a message and then decide whether to process it with a
    separate remove operation.</dd>
</dl>

<h3>Transaction vs Standalone Mode</h3>
<p>If <code>msg.transaction.connection</code> exists (from a begin-transaction node),
the dequeue uses that shared connection and does NOT auto-commit. The message stays
locked until end-transaction commits or rolls back.</p>
<p>If no transaction connection exists, the dequeue creates its own connection,
dequeues, auto-commits, and closes. Messages are immediately and permanently consumed.</p>

<h3>Subscriber</h3>
<p>For multi-consumer queues, specify the subscriber name. Each subscriber maintains
its own position in the queue and can have rules that filter which messages it receives.
Leave empty for single-consumer queues.</p>

<h3>Output</h3>
<dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>The dequeued message payload.</dd>
    <dt>dequeued <span class="property-type">object</span></dt>
    <dd>Same as payload (for backward compatibility and use with SCM payload mappings).</dd>
</dl>
</script>
