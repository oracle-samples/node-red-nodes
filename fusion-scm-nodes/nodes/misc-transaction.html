<script type="text/javascript">
RED.nodes.registerType("misc-transaction", {
    category: "oracle fusion scm",
    paletteLabel: "miscellaneous transaction",
    defaults: {
        name: { value: "" },
        server: { type: "scm-server", required: true },
        mode: { value: "custom" },
        mappings: { value: '[{"scmField":"SourceCode","sourceType":"dequeued","value":""},{"scmField":"SourceHeaderId","sourceType":"dequeued","value":""},{"scmField":"SourceLineId","sourceType":"dequeued","value":""},{"scmField":"TransactionMode","sourceType":"dequeued","value":""},{"scmField":"UseCurrentCostFlag","sourceType":"dequeued","value":""},{"scmField":"TransactionTypeName","sourceType":"dequeued","value":""},{"scmField":"OrganizationId","sourceType":"dequeued","value":""},{"scmField":"ItemNumber","sourceType":"dequeued","value":""},{"scmField":"TransactionQuantity","sourceType":"dequeued","value":""},{"scmField":"TransactionUnitOfMeasure","sourceType":"dequeued","value":""},{"scmField":"TransactionDate","sourceType":"dequeued","value":""},{"scmField":"SubinventoryCode","sourceType":"dequeued","value":""},{"scmField":"serials","sourceType":"msg","value":""}]' }
    },
    inputs: 1, outputs: 1, color: "#4F7D7B", icon: "font-awesome/fa-cubes",
    label: function () {
        if (this.name) return this.name;
        var labels = {
            receipt: "miscellaneous receipt",
            issue: "miscellaneous issue",
            custom: "miscellaneous transaction"
        };
        return labels[this.mode] || "miscellaneous transaction";
    },
    oneditprepare: function () {
        var node = this;
        var defaultMappingsByMode = {
            custom: [
                {scmField:"SourceCode",sourceType:"dequeued",value:""},
                {scmField:"SourceHeaderId",sourceType:"dequeued",value:""},
                {scmField:"SourceLineId",sourceType:"dequeued",value:""},
                {scmField:"TransactionMode",sourceType:"dequeued",value:""},
                {scmField:"UseCurrentCostFlag",sourceType:"dequeued",value:""},
                {scmField:"TransactionTypeName",sourceType:"dequeued",value:""},
                {scmField:"OrganizationId",sourceType:"dequeued",value:""},
                {scmField:"ItemNumber",sourceType:"dequeued",value:""},
                {scmField:"TransactionQuantity",sourceType:"dequeued",value:""},
                {scmField:"TransactionUnitOfMeasure",sourceType:"dequeued",value:""},
                {scmField:"TransactionDate",sourceType:"dequeued",value:""},
                {scmField:"SubinventoryCode",sourceType:"dequeued",value:""},
                {scmField:"serials",sourceType:"msg",value:""}
            ],
            receipt: [
                {scmField:"SourceCode",sourceType:"dequeued",value:""},
                {scmField:"SourceHeaderId",sourceType:"dequeued",value:""},
                {scmField:"SourceLineId",sourceType:"dequeued",value:""},
                {scmField:"TransactionMode",sourceType:"dequeued",value:""},
                {scmField:"UseCurrentCostFlag",sourceType:"dequeued",value:""},
                {scmField:"OrganizationId",sourceType:"dequeued",value:""},
                {scmField:"ItemNumber",sourceType:"dequeued",value:""},
                {scmField:"TransactionQuantity",sourceType:"dequeued",value:""},
                {scmField:"TransactionUnitOfMeasure",sourceType:"dequeued",value:""},
                {scmField:"TransactionDate",sourceType:"dequeued",value:""},
                {scmField:"SubinventoryCode",sourceType:"dequeued",value:""},
                {scmField:"serials",sourceType:"msg",value:""}
            ],
            issue: [
                {scmField:"SourceCode",sourceType:"dequeued",value:""},
                {scmField:"SourceHeaderId",sourceType:"dequeued",value:""},
                {scmField:"SourceLineId",sourceType:"dequeued",value:""},
                {scmField:"TransactionMode",sourceType:"dequeued",value:""},
                {scmField:"UseCurrentCostFlag",sourceType:"dequeued",value:""},
                {scmField:"OrganizationId",sourceType:"dequeued",value:""},
                {scmField:"ItemNumber",sourceType:"dequeued",value:""},
                {scmField:"TransactionQuantity",sourceType:"dequeued",value:""},
                {scmField:"TransactionUnitOfMeasure",sourceType:"dequeued",value:""},
                {scmField:"TransactionDate",sourceType:"dequeued",value:""},
                {scmField:"SubinventoryCode",sourceType:"dequeued",value:""},
                {scmField:"serials",sourceType:"msg",value:""}
            ]
        };
        var userEditedMappings = false;
        var lastMode = node.mode || "custom";
        var mappings = [];
        try { mappings = JSON.parse(node.mappings); } catch(e) {}
        if (!Array.isArray(mappings) || mappings.length === 0) {
            mappings = defaultMappingsByMode[lastMode] || defaultMappingsByMode.custom;
        }

        scmMappingEditor.init({ mappings: JSON.stringify(mappings) });
        $("#scm-mappings-container").on("change input", ".scm-field,.scm-value,.scm-boolean-value,.scm-json-value,.scm-source-type", function() {
            userEditedMappings = true;
        });
        $("#node-input-mode").on("change", function () {
            var mode = $(this).val() || "custom";
            if (mode !== lastMode && !userEditedMappings) {
                scmMappingEditor.renderAll(defaultMappingsByMode[mode] || defaultMappingsByMode.custom);
            }
            lastMode = mode;
        });
        window.scmEndpointPreview.init("inventoryStagedTransactions");
    },
    oneditsave: function () {
        this.mappings = scmMappingEditor.save();
    }
});

// =====================================================================
// Shared SCM mapping editor (reused across all SCM transaction nodes)
// Only defined once; safe to include in multiple HTML files.
// =====================================================================
if (!window.scmMappingEditor) {
window.scmMappingEditor = (function () {
    function _escapeHtml(s) {
        return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    var _valueLabelMap = {
        dequeued: "Field Name",
        msg: "Property Path",
        static: "Text",
        staticNumber: "Number",
        staticBoolean: "Boolean",
        staticJson: "JSON",
        currentTimestamp: "Timestamp"
    };

    var _valuePlaceholderMap = {
        dequeued: "e.g. AssetNumber",
        msg: "e.g. payload.someField",
        static: "e.g. STANDARD",
        staticNumber: "e.g. 1",
        staticBoolean: "true or false",
        staticJson: "e.g. [{\"FmSerialNumber\":\"SN001\"}]",
        currentTimestamp: "Generated at runtime"
    };

    function _normalizeBooleanValue(value) {
        var normalized = String(value == null ? "" : value).trim().toLowerCase();
        return normalized === "false" ? "false" : "true";
    }

    function _syncValueControl(row, type) {
        var valueInput = row.find(".scm-value");
        var booleanInput = row.find(".scm-boolean-value");
        var jsonInput = row.find(".scm-json-value");
        row.find(".scm-value-label").text(_valueLabelMap[type] || "Value");
        valueInput.attr("placeholder", _valuePlaceholderMap[type] || "");

        if (type === "staticBoolean") {
            valueInput.hide().prop("disabled", true);
            jsonInput.hide().prop("disabled", true);
            booleanInput.show().prop("disabled", false);
            if (booleanInput.val() !== "true" && booleanInput.val() !== "false") {
                booleanInput.val("true");
            }
            return;
        }

        if (type === "staticJson") {
            valueInput.hide().prop("disabled", true);
            booleanInput.hide().prop("disabled", true);
            jsonInput.show().prop("disabled", false);
            return;
        }

        booleanInput.hide().prop("disabled", true);
        jsonInput.hide().prop("disabled", true);
        valueInput.show().prop("disabled", type === "currentTimestamp");
        if (type === "currentTimestamp") valueInput.val("");
    }

    function _addRow(m) {
        var srcType = m.sourceType || "dequeued";
        var row = $(
            '<div class="scm-mapping-row" style="border:1px solid #ddd;border-radius:4px;padding:8px;margin-bottom:6px;background:#fafafa;">' +
              '<div style="display:flex;align-items:center;gap:8px;">' +
                '<div class="scm-drag-handle" style="cursor:grab;padding:4px 2px;color:#999;font-size:16px;" title="Drag to reorder">&#9776;</div>' +
                '<div style="flex:1;"><label style="font-size:11px;color:#666;">SCM Field</label>' +
                  '<input type="text" class="scm-field" value="' + _escapeHtml(m.scmField || "") + '" style="width:100%;" /></div>' +
                '<div style="width:140px;"><label style="font-size:11px;color:#666;">Source</label>' +
                  '<select class="scm-source-type" style="width:100%;">' +
                    '<option value="dequeued"' + (srcType === "dequeued" ? ' selected' : '') + '>dequeued data</option>' +
                    '<option value="msg"' + (srcType === "msg" ? ' selected' : '') + '>msg property</option>' +
                    '<option value="static"' + (srcType === "static" ? ' selected' : '') + '>static text</option>' +
                    '<option value="staticNumber"' + (srcType === "staticNumber" ? ' selected' : '') + '>static number</option>' +
                    '<option value="staticBoolean"' + (srcType === "staticBoolean" ? ' selected' : '') + '>static boolean</option>' +
                    '<option value="staticJson"' + (srcType === "staticJson" ? ' selected' : '') + '>static JSON</option>' +
                    '<option value="currentTimestamp"' + (srcType === "currentTimestamp" ? ' selected' : '') + '>current timestamp</option>' +
                  '</select></div>' +
                '<div style="flex:1;"><label style="font-size:11px;color:#666;" class="scm-value-label">' + (_valueLabelMap[srcType] || "Value") + '</label>' +
                  '<input type="text" class="scm-value" value="' + _escapeHtml(m.value || "") + '" placeholder="' + (_valuePlaceholderMap[srcType] || "") + '" style="width:100%;" />' +
                  '<select class="scm-boolean-value" style="width:100%;display:none;">' +
                    '<option value="true">true</option>' +
                    '<option value="false">false</option>' +
                  '</select>' +
                  '<textarea class="scm-json-value" rows="3" style="width:100%;display:none;font-family:monospace;font-size:12px;">' + _escapeHtml(m.value || "") + '</textarea></div>' +
                '<div style="padding-top:14px;">' +
                  '<button type="button" class="red-ui-button red-ui-button-small" onclick="$(this).closest(\'.scm-mapping-row\').remove();">&times;</button></div>' +
              '</div>' +
            '</div>'
        );
        row.find(".scm-boolean-value").val(_normalizeBooleanValue(m.value));
        row.find(".scm-source-type").on("change", function () {
            var type = $(this).val();
            if (type === "staticBoolean") {
                row.find(".scm-boolean-value").val(_normalizeBooleanValue(row.find(".scm-value").val()));
            }
            if (type === "staticJson" && !row.find(".scm-json-value").val()) {
                row.find(".scm-json-value").val(row.find(".scm-value").val());
            }
            _syncValueControl(row, type);
        });
        _syncValueControl(row, srcType);
        $("#scm-mappings-container").append(row);
    }

    function renderAll(mappings) {
        $("#scm-mappings-container").empty();
        if (Array.isArray(mappings)) {
            mappings.forEach(function (m) { _addRow(m); });
        }
    }

    function init(node) {
        var mappings = [];
        try { mappings = JSON.parse(node.mappings); } catch(e) { mappings = []; }
        if (!Array.isArray(mappings)) mappings = [];
        renderAll(mappings);

        $("#btn-add-scm-mapping").off("click").on("click", function () {
            _addRow({ scmField: "", sourceType: "static", value: "" });
        });

        $("#scm-mappings-container").sortable({
            handle: ".scm-drag-handle", axis: "y", cursor: "grabbing",
            opacity: 0.7, placeholder: "scm-sortable-placeholder", tolerance: "pointer"
        });
    }

    function save() {
        var mappings = [];
        $("#scm-mappings-container .scm-mapping-row").each(function () {
            var row = $(this);
            var sourceType = row.find(".scm-source-type").val();
            var m = {
                scmField: row.find(".scm-field").val().trim(),
                sourceType: sourceType,
                value: sourceType === "staticJson" ? row.find(".scm-json-value").val().trim() : sourceType === "staticBoolean" ? row.find(".scm-boolean-value").val() : row.find(".scm-value").val().trim()
            };
            if (m.scmField) mappings.push(m);
        });
        return JSON.stringify(mappings);
    }

    return { init: init, save: save, renderAll: renderAll };
})();
var scmMappingEditor = window.scmMappingEditor;
}

if (!window.scmEndpointPreview) {
window.scmEndpointPreview = (function () {
    function init(endpoint) {
        var $display = $("#scm-url-display");
        function update() {
            var serverNodeId = $("#node-input-server").val();
            var serverNode = RED.nodes.node(serverNodeId);
            if (serverNode && serverNode.hostname && serverNode.version) {
                $display.text("https://" + serverNode.hostname + "/fscmRestApi/resources/" + serverNode.version + "/" + endpoint);
            } else {
                $display.text("Select SCM Server to preview endpoint");
            }
        }
        update();
        $("#node-input-server").on("change", update);
    }
    return { init: init };
})();
}

</script>
<style>    .scm-sortable-placeholder { border:2px dashed #4F7D7B; border-radius:4px; background:#eef5f4; height:50px; margin-bottom:6px; }
    .scm-drag-handle:hover { color:#555 !important; }
</style>

<script type="text/x-red" data-template-name="misc-transaction">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-globe"></i> SCM Server</label>
        <input type="text" id="node-input-server" />
    </div>
    <div class="form-row">
        <label for="node-input-mode"><i class="fa fa-list"></i> Mode</label>
        <select id="node-input-mode" style="width:200px;">
            <option value="custom">Custom</option>
            <option value="receipt">Miscellaneous Receipt</option>
            <option value="issue">Miscellaneous Issue</option>
        </select>
    </div>
    <hr/>
    <div class="form-row">
        <label><i class="fa fa-link"></i> Endpoint</label>
        <span id="scm-url-display" class="scm-endpoint-preview" style="font-size:12px;color:#555;word-break:break-all;">Select SCM Server to preview endpoint</span>
    </div>    <hr/>
    <div class="form-row">
        <label><i class="fa fa-list-ul"></i> Payload Mappings</label>
        <div style="margin-left:105px;font-size:11px;color:#888;margin-bottom:4px;">
            Map SCM API fields to dequeued data, message properties, typed static values including static JSON, or the current timestamp. Drag &#9776; to reorder.
        </div>
    </div>
    <div class="form-row">
        <div id="scm-mappings-container" style="margin-left:20px;margin-right:20px;"></div>
        <div style="margin-left:20px;margin-top:4px;">
            <button type="button" class="red-ui-button red-ui-button-small" id="btn-add-scm-mapping">+ Add Mapping</button>
        </div>
    </div>
</script>

<script type="text/x-red" data-help-name="misc-transaction">
<p>Creates a Miscellaneous Inventory Transaction in Oracle Fusion SCM. Supports both receipts (+) and issues (-).</p>
<h3>Configuration</h3>
<dl class="message-properties">
    <dt>SCM Server</dt><dd>Server configuration for authentication and connection.</dd>
    <dt>Mode</dt><dd><code>Custom</code> leaves mapped fields unchanged. <code>Miscellaneous Receipt</code> sets <code>TransactionTypeName</code> to <code>Miscellaneous Receipt</code>. <code>Miscellaneous Issue</code> sets <code>TransactionTypeName</code> to <code>Miscellaneous Issue</code>. Receipt and Issue presets use <code>OrganizationId</code> for staged inventory transactions and do not include a <code>TransactionTypeName</code> mapping because the mode supplies it. The node does not alter <code>TransactionQuantity</code>.</dd>
    <dt>Endpoint</dt><dd>Auto-built from server config for this node type.</dd>
    <dt>Payload Mappings</dt>
    <dd>Map SCM API fields to values. Each row specifies:
        <ul>
            <li><b>SCM Field</b> &mdash; the API field name</li>
            <li><b>Source</b> &mdash; <code>dequeued data</code> (reads from msg.dequeued), <code>msg property</code> (reads from any msg path), <code>static text</code>, <code>static number</code>, <code>static boolean</code>, <code>static JSON</code>, or <code>current timestamp</code></li>
            <li><b>Value</b> &mdash; the field name, property path, or literal value depending on source type</li>
        </ul>
    </dd>
</dl>
<h3>Outputs</h3>
<dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt><dd>API response body on success, error details on failure.</dd>
    <dt>statusCode <span class="property-type">number</span></dt><dd>HTTP status code.</dd>
    <dt>error <span class="property-type">object</span></dt><dd>Error details on failure: <code>{ message, code }</code>.</dd>
</dl>
<h3>Details</h3>
<p>Sends a <code>POST</code> request to the Inventory Staged Transactions REST endpoint. Receipt and Issue modes set the transaction type name but leave quantity unchanged; map the quantity expected by your Fusion transaction setup. Use the <code>serials</code> mapping for serialized item receipts or issues.</p>
</script>
