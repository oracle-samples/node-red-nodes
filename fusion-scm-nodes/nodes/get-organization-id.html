<script type="text/javascript">
RED.nodes.registerType("get-organization-id", {
    category: "oracle fusion scm",
    paletteLabel: "get organization id",
    defaults: {
        name: { value: "" },
        server: { type: "scm-server", required: true },
        organizationName: { value: "" }
    },
    inputs: 1, outputs: 1,
    color: "#4F7D7B",
    icon: "font-awesome/fa-search",
    label: function () { return this.name || "get organization id"; },
    oneditprepare: function () {
        var endpoint = "inventoryOrganizations";
        var $endpoint = $("#get-org-endpoint-display");

        function updateEndpointPreview() {
            var serverNodeId = $("#node-input-server").val();
            var serverNode = RED.nodes.node(serverNodeId);
            if (!serverNode || !serverNode.hostname || !serverNode.version) {
                $endpoint.text("Select SCM Server to preview endpoint");
                return;
            }
            var base = "https://" + serverNode.hostname + "/fscmRestApi/resources/" + serverNode.version + "/" + endpoint;
            var queryValue = $("#node-input-organizationName").val().trim();
            $endpoint.text(queryValue ? base + "?q=OrganizationName=" + queryValue : base);
        }

        updateEndpointPreview();
        $("#node-input-server").on("change", updateEndpointPreview);
        $("#node-input-organizationName").on("input", updateEndpointPreview);
    }
});
</script>

<script type="text/x-red" data-template-name="get-organization-id">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-globe"></i> SCM Server</label>
        <input type="text" id="node-input-server">
    </div>
    <hr/>
    <div class="form-row">
        <label><i class="fa fa-link"></i> Endpoint</label>
        <span id="get-org-endpoint-display" style="font-size:12px;color:#555;word-break:break-all;">Select SCM Server to preview endpoint</span>
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-organizationName" style="width:140px;"><i class="fa fa-hashtag"></i> Organization Name</label>
        <input type="text" id="node-input-organizationName">
        <div style="margin-left:145px;font-size:11px;color:#888;margin-top:2px;">Leave empty to read from <code>msg.organizationName</code>.</div>
    </div>
</script>

<script type="text/x-red" data-help-name="get-organization-id">
<p>Retrieves an Organization ID from Oracle Fusion SCM by organization name.</p>
<h3>Configuration</h3>
<dl class="message-properties">
    <dt>SCM Server</dt><dd>Server configuration for authentication and connection.</dd>
    <dt>Organization Name</dt><dd>The value to query by. If left blank, reads from <code>msg.organizationName</code>.</dd>
    <dt>Endpoint</dt><dd>Read-only preview of the endpoint URL derived from the selected SCM Server.</dd>
</dl>
<h3>Outputs</h3>
<dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt><dd>API response body containing the matching records.</dd>
    <dt>statusCode <span class="property-type">number</span></dt><dd>HTTP status code.</dd>
    <dt>error <span class="property-type">object</span></dt><dd>Error details on failure: <code>{ message, code }</code>.</dd>
</dl>
<h3>Runtime overrides</h3>
<dl class="message-properties">
    <dt>msg.organizationName <span class="property-type">string</span></dt><dd>Overrides the Organization Name for this message.</dd>
</dl>
<h3>Details</h3>
<p>Sends a <code>GET</code> request to the Inventory Organizations endpoint, filtering by <code>OrganizationName</code>. Returns the matching organization record(s) including <code>OrganizationId</code> in <code>msg.payload</code>. To query a different endpoint or use a custom query parameter, use the <b>scm lookup</b> node in custom mode instead.</p>
</script>
