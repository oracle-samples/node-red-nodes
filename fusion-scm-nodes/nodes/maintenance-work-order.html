<script type="text/javascript">
RED.nodes.registerType("maintenance-work-order", {
    category: "oracle fusion scm",
    paletteLabel: "maintenance work order",
    defaults: {
        name: { value: "" },
        server: { type: "scm-server", required: true },
        action: { value: "create" },
        workOrderId: { value: "" },
        mappings: { value: '[{"scmField":"WorkOrderNumber","sourceType":"msg","value":""},{"scmField":"OrganizationCode","sourceType":"msg","value":""},{"scmField":"AssetNumber","sourceType":"msg","value":""},{"scmField":"MntWorkDefinitionCode","sourceType":"msg","value":""},{"scmField":"WorkOrderTypeCode","sourceType":"msg","value":""},{"scmField":"WorkOrderSubTypeCode","sourceType":"msg","value":""},{"scmField":"WorkOrderStatusCode","sourceType":"msg","value":""},{"scmField":"PlannedStartQuantity","sourceType":"msg","value":""},{"scmField":"PlannedStartDate","sourceType":"msg","value":""},{"scmField":"WorkOrderDescription","sourceType":"msg","value":""},{"scmField":"AllowCompletionToInventoryFlag","sourceType":"msg","value":""},{"scmField":"CompletionSubinventoryCode","sourceType":"msg","value":""},{"scmField":"AllowOutOfSequenceOperationCompletionFlag","sourceType":"msg","value":""},{"scmField":"ExplosionFlag","sourceType":"msg","value":""}]' }
    },
    inputs: 1, outputs: 1, color: "#4F7D7B", icon: "font-awesome/fa-wrench",
    label: function () {
        if (this.name) return this.name;
        return this.action === "update" ? "update maintenance work order" : "create maintenance work order";
    },
    oneditprepare: function () {
        var node = this;
        var defaultMappings = {
            create: [
                {scmField:"WorkOrderNumber",sourceType:"msg",value:""},
                {scmField:"OrganizationCode",sourceType:"msg",value:""},
                {scmField:"AssetNumber",sourceType:"msg",value:""},
                {scmField:"MntWorkDefinitionCode",sourceType:"msg",value:""},
                {scmField:"WorkOrderTypeCode",sourceType:"msg",value:""},
                {scmField:"WorkOrderSubTypeCode",sourceType:"msg",value:""},
                {scmField:"WorkOrderStatusCode",sourceType:"msg",value:""},
                {scmField:"PlannedStartQuantity",sourceType:"msg",value:""},
                {scmField:"PlannedStartDate",sourceType:"msg",value:""},
                {scmField:"WorkOrderDescription",sourceType:"msg",value:""},
                {scmField:"AllowCompletionToInventoryFlag",sourceType:"msg",value:""},
                {scmField:"CompletionSubinventoryCode",sourceType:"msg",value:""},
                {scmField:"AllowOutOfSequenceOperationCompletionFlag",sourceType:"msg",value:""},
                {scmField:"ExplosionFlag",sourceType:"msg",value:""}
            ],
            update: [
                {scmField:"WorkOrderDescription",sourceType:"msg",value:""},
                {scmField:"WorkOrderStatusCode",sourceType:"msg",value:""},
                {scmField:"WorkOrderPriority",sourceType:"msg",value:""},
                {scmField:"PlannedStartDate",sourceType:"msg",value:""},
                {scmField:"PlannedCompletionDate",sourceType:"msg",value:""},
                {scmField:"AllowCompletionToInventoryFlag",sourceType:"msg",value:""},
                {scmField:"CompletionSubinventoryCode",sourceType:"msg",value:""},
                {scmField:"AllowOutOfSequenceOperationCompletionFlag",sourceType:"msg",value:""}
            ]
        };
        var userEditedMappings = false;
        var lastAction = node.action || "create";

        function updateEndpoint() {
            var serverNodeId = $("#node-input-server").val();
            var serverNode = RED.nodes.node(serverNodeId);
            var action = $("#node-input-action").val() || "create";
            var workOrderId = $("#node-input-workOrderId").val().trim();
            if (serverNode && serverNode.hostname && serverNode.version) {
                var endpoint = "https://" + serverNode.hostname + "/fscmRestApi/resources/" + serverNode.version + "/maintenanceWorkOrders";
                if (action === "update") {
                    endpoint += "/" + (workOrderId ? encodeURIComponent(workOrderId) : "{WorkOrderId}");
                }
                $("#maintenance-work-order-url-display").text(endpoint);
            } else {
                $("#maintenance-work-order-url-display").text("Select SCM Server to preview endpoint");
            }
        }

        function updateSections() {
            var action = $("#node-input-action").val() || "create";
            $(".maintenance-work-order-update-section").toggle(action === "update");
            if (action !== lastAction && !userEditedMappings) {
                window.scmMappingEditor.renderAll(defaultMappings[action] || []);
                lastAction = action;
            }
            updateEndpoint();
        }

        var mappings = [];
        try { mappings = JSON.parse(node.mappings); } catch(e) {}
        if (!Array.isArray(mappings)) mappings = [];
        if (mappings.length === 0) {
            mappings = defaultMappings[node.action || "create"] || [];
        }

        window.scmMappingEditor.init({ mappings: JSON.stringify(mappings) });
        $("#scm-mappings-container").on("change input", ".scm-field,.scm-value,.scm-boolean-value,.scm-source-type", function() {
            userEditedMappings = true;
        });

        updateSections();
        $("#node-input-action").on("change", function() {
            updateSections();
        });
        $("#node-input-server").on("change", updateEndpoint);
        $("#node-input-workOrderId").on("input", updateEndpoint);
    },
    oneditsave: function () {
        this.mappings = window.scmMappingEditor.save();
    }
});

if (!window.scmMappingEditor) {
window.scmMappingEditor = (function () {
    function _escapeHtml(s) {
        return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    var _valueLabelMap = {
        dequeued: "Field Name",
        msg: "Property Path",
        static: "Text",
        staticNumber: "Number",
        staticBoolean: "Boolean",
        staticJson: "JSON",
        currentTimestamp: "Timestamp"
    };

    var _valuePlaceholderMap = {
        dequeued: "e.g. AssetNumber",
        msg: "e.g. payload.someField",
        static: "e.g. STANDARD",
        staticNumber: "e.g. 1",
        staticBoolean: "true or false",
        staticJson: "e.g. [{\"FmSerialNumber\":\"SN001\"}]",
        currentTimestamp: "Generated at runtime"
    };

    function _normalizeBooleanValue(value) {
        var normalized = String(value == null ? "" : value).trim().toLowerCase();
        return normalized === "false" ? "false" : "true";
    }

    function _syncValueControl(row, type) {
        var valueInput = row.find(".scm-value");
        var booleanInput = row.find(".scm-boolean-value");
        var jsonInput = row.find(".scm-json-value");
        row.find(".scm-value-label").text(_valueLabelMap[type] || "Value");
        valueInput.attr("placeholder", _valuePlaceholderMap[type] || "");

        if (type === "staticBoolean") {
            valueInput.hide().prop("disabled", true);
            jsonInput.hide().prop("disabled", true);
            booleanInput.show().prop("disabled", false);
            if (booleanInput.val() !== "true" && booleanInput.val() !== "false") {
                booleanInput.val("true");
            }
            return;
        }

        if (type === "staticJson") {
            valueInput.hide().prop("disabled", true);
            booleanInput.hide().prop("disabled", true);
            jsonInput.show().prop("disabled", false);
            return;
        }

        booleanInput.hide().prop("disabled", true);
        jsonInput.hide().prop("disabled", true);
        valueInput.show().prop("disabled", type === "currentTimestamp");
        if (type === "currentTimestamp") valueInput.val("");
    }

    function _addRow(m) {
        var srcType = m.sourceType || "msg";
        var row = $(
            '<div class="scm-mapping-row" style="border:1px solid #ddd;border-radius:4px;padding:8px;margin-bottom:6px;background:#fafafa;">' +
              '<div style="display:flex;align-items:center;gap:8px;">' +
                '<div class="scm-drag-handle" style="cursor:grab;padding:4px 2px;color:#999;font-size:16px;" title="Drag to reorder">&#9776;</div>' +
                '<div style="flex:1;"><label style="font-size:11px;color:#666;">SCM Field</label>' +
                  '<input type="text" class="scm-field" value="' + _escapeHtml(m.scmField || "") + '" style="width:100%;" /></div>' +
                '<div style="width:140px;"><label style="font-size:11px;color:#666;">Source</label>' +
                  '<select class="scm-source-type" style="width:100%;">' +
                    '<option value="dequeued"' + (srcType === "dequeued" ? ' selected' : '') + '>dequeued data</option>' +
                    '<option value="msg"' + (srcType === "msg" ? ' selected' : '') + '>msg property</option>' +
                    '<option value="static"' + (srcType === "static" ? ' selected' : '') + '>static text</option>' +
                    '<option value="staticNumber"' + (srcType === "staticNumber" ? ' selected' : '') + '>static number</option>' +
                    '<option value="staticBoolean"' + (srcType === "staticBoolean" ? ' selected' : '') + '>static boolean</option>' +
                    '<option value="staticJson"' + (srcType === "staticJson" ? ' selected' : '') + '>static JSON</option>' +
                    '<option value="currentTimestamp"' + (srcType === "currentTimestamp" ? ' selected' : '') + '>current timestamp</option>' +
                  '</select></div>' +
                '<div style="flex:1;"><label style="font-size:11px;color:#666;" class="scm-value-label">' + (_valueLabelMap[srcType] || "Value") + '</label>' +
                  '<input type="text" class="scm-value" value="' + _escapeHtml(m.value || "") + '" placeholder="' + (_valuePlaceholderMap[srcType] || "") + '" style="width:100%;" />' +
                  '<select class="scm-boolean-value" style="width:100%;display:none;">' +
                    '<option value="true">true</option>' +
                    '<option value="false">false</option>' +
                  '</select>' +
                  '<textarea class="scm-json-value" rows="3" style="width:100%;display:none;font-family:monospace;font-size:12px;">' + _escapeHtml(m.value || "") + '</textarea></div>' +
                '<div style="padding-top:14px;">' +
                  '<button type="button" class="red-ui-button red-ui-button-small" onclick="$(this).closest(\'.scm-mapping-row\').remove();">&times;</button></div>' +
              '</div>' +
            '</div>'
        );
        row.find(".scm-boolean-value").val(_normalizeBooleanValue(m.value));
        row.find(".scm-source-type").on("change", function () {
            var type = $(this).val();
            if (type === "staticBoolean") {
                row.find(".scm-boolean-value").val(_normalizeBooleanValue(row.find(".scm-value").val()));
            }
            if (type === "staticJson" && !row.find(".scm-json-value").val()) {
                row.find(".scm-json-value").val(row.find(".scm-value").val());
            }
            _syncValueControl(row, type);
        });
        _syncValueControl(row, srcType);
        $("#scm-mappings-container").append(row);
    }

    function renderAll(mappings) {
        $("#scm-mappings-container").empty();
        if (Array.isArray(mappings)) {
            mappings.forEach(function (m) { _addRow(m); });
        }
    }

    function init(node) {
        var mappings = [];
        try { mappings = JSON.parse(node.mappings); } catch(e) { mappings = []; }
        if (!Array.isArray(mappings)) mappings = [];
        renderAll(mappings);

        $("#btn-add-scm-mapping").off("click").on("click", function () {
            _addRow({ scmField: "", sourceType: "static", value: "" });
        });

        $("#scm-mappings-container").sortable({
            handle: ".scm-drag-handle", axis: "y", cursor: "grabbing",
            opacity: 0.7, placeholder: "scm-sortable-placeholder", tolerance: "pointer"
        });
    }

    function save() {
        var mappings = [];
        $("#scm-mappings-container .scm-mapping-row").each(function () {
            var row = $(this);
            var sourceType = row.find(".scm-source-type").val();
            var m = {
                scmField: row.find(".scm-field").val().trim(),
                sourceType: sourceType,
                value: sourceType === "staticJson" ? row.find(".scm-json-value").val().trim() : sourceType === "staticBoolean" ? row.find(".scm-boolean-value").val() : row.find(".scm-value").val().trim()
            };
            if (m.scmField) mappings.push(m);
        });
        return JSON.stringify(mappings);
    }

    return { init: init, save: save, renderAll: renderAll };
})();
}
</script>

<style>
    .scm-sortable-placeholder { border:2px dashed #4F7D7B; border-radius:4px; background:#eef5f4; height:50px; margin-bottom:6px; }
    .scm-drag-handle:hover { color:#555 !important; }
</style>

<script type="text/x-red" data-template-name="maintenance-work-order">
    <div class="form-row">
        <label for="node-input-name" style="width:130px;"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>
    <div class="form-row">
        <label for="node-input-server" style="width:130px;"><i class="fa fa-globe"></i> SCM Server</label>
        <input type="text" id="node-input-server" />
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-action" style="width:130px;"><i class="fa fa-list"></i> Action</label>
        <select id="node-input-action" style="width:160px;">
            <option value="create">Create</option>
            <option value="update">Update</option>
        </select>
    </div>
    <div class="form-row maintenance-work-order-update-section">
        <label for="node-input-workOrderId" style="width:130px;"><i class="fa fa-key"></i> Work Order ID</label>
        <input type="text" id="node-input-workOrderId" placeholder="Leave empty to read msg.workOrderId">
        <div style="margin-left:135px;font-size:11px;color:#888;margin-top:4px;">
            Fusion resource ID for the maintenance work order header. Runtime value can be supplied by <code>msg.workOrderId</code>.
        </div>
    </div>
    <hr/>
    <div class="form-row">
        <label style="width:130px;"><i class="fa fa-link"></i> Endpoint</label>
        <span id="maintenance-work-order-url-display" style="font-size:12px;color:#555;word-break:break-all;">Select SCM Server to preview endpoint</span>
    </div>
    <hr/>
    <div class="form-row">
        <label style="width:130px;"><i class="fa fa-list-ul"></i> Payload Mappings</label>
        <div style="margin-left:135px;font-size:11px;color:#888;margin-bottom:4px;">
            Map Fusion maintenance work order fields to message properties, dequeued data, typed static values including static JSON, or the current timestamp. Drag &#9776; to reorder.
        </div>
    </div>
    <div class="form-row">
        <div id="scm-mappings-container" style="margin-left:20px;margin-right:20px;"></div>
        <div style="margin-left:20px;margin-top:4px;">
            <button type="button" class="red-ui-button red-ui-button-small" id="btn-add-scm-mapping">+ Add Mapping</button>
        </div>
    </div>
</script>

<script type="text/x-red" data-help-name="maintenance-work-order">
<p>Creates or updates a maintenance work order header in Oracle Fusion SCM.</p>
<h3>Configuration</h3>
<dl class="message-properties">
    <dt>SCM Server</dt><dd>Server configuration for authentication and connection.</dd>
    <dt>Action</dt><dd><code>Create</code> posts a new work order to <code>maintenanceWorkOrders</code>. <code>Update</code> sends HTTP PATCH to an existing work order by resource ID.</dd>
    <dt>Work Order ID</dt><dd>Required for Update unless supplied at runtime as <code>msg.workOrderId</code>.</dd>
    <dt>Payload Mappings</dt>
    <dd>Map Fusion API fields to values. Each row specifies:
        <ul>
            <li><b>SCM Field</b> - the maintenance work order REST field name.</li>
            <li><b>Source</b> - <code>msg property</code>, <code>dequeued data</code>, <code>static text</code>, <code>static number</code>, <code>static boolean</code>, <code>static JSON</code>, or <code>current timestamp</code>.</li>
            <li><b>Value</b> - the property path, dequeued field name, or literal value depending on source type.</li>
        </ul>
    </dd>
</dl>
<h3>Inputs</h3>
<dl class="message-properties">
    <dt>action <span class="property-type">string</span></dt><dd>Optional runtime override: <code>create</code> or <code>update</code>.</dd>
    <dt>workOrderId <span class="property-type">string | number</span></dt><dd>Resource ID used by Update.</dd>
    <dt>payload <span class="property-type">object</span></dt><dd>Common source for mapped maintenance work order values.</dd>
    <dt>dequeued <span class="property-type">object</span></dt><dd>Optional source when a mapping row uses <code>dequeued data</code>.</dd>
</dl>
<h3>Outputs</h3>
<dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt><dd>Fusion response body on success, error details on failure.</dd>
    <dt>maintenanceWorkOrder <span class="property-type">object</span></dt><dd>Same successful Fusion response body for downstream work order-specific routing.</dd>
    <dt>statusCode <span class="property-type">number</span></dt><dd>HTTP status code.</dd>
    <dt>error <span class="property-type">object</span></dt><dd>Error details on failure: <code>{ message, code }</code>.</dd>
</dl>
<h3>Details</h3>
<p>This node manages the maintenance work order header resource. Default mapping rows provide common Fusion field names, while the Value column starts blank so users can choose the correct source type and path. Required create fields depend on the Fusion Maintenance setup; common fields include organization, asset, work definition, work order type/status, planned dates, and description. Use lookup nodes upstream when a flow needs to resolve assets, work definitions, or existing work order IDs before calling this node.</p>
<p>Operations, resources, materials, costs, and other child collections are not created or updated by this first-pass node.</p>
</script>
